document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Coach Claude · B · Practice Journal<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>/* Coach Claude — Colors & Type Tokens\n * Sourced from src/app/globals.css + Tailwind v4 @theme block in the codebase.\n * HSL values preserved from the repo; flattened to hex/oklch-friendly CSS vars.\n */\n\n:root {\n  /* ---------- CORE PALETTE (light) ---------- */\n  --bg:            hsl(180 15% 97%);   /* page background — warm-cool off-white */\n  --fg:            hsl(200 25% 8%);    /* near-black slate, cool */\n  --fg-muted:      hsl(200 10% 46%);   /* secondary text */\n  --card:          hsl(0 0% 100%);\n  --card-fg:       hsl(200 25% 8%);\n  --popover:       hsl(0 0% 100%);\n  --border:        hsl(200 20% 90%);\n  --input:         hsl(200 20% 90%);\n  --ring:          hsl(184 82% 26%);\n\n  /* Teal — the single brand accent. Used sparingly for CTAs, links, active nav. */\n  --primary:       hsl(184 82% 26%);   /* #0D6F7A — \"coaching-500\" */\n  --primary-fg:    hsl(180 20% 98%);\n\n  --secondary:     hsl(180 18% 95%);\n  --secondary-fg:  hsl(200 25% 12%);\n  --muted:         hsl(180 12% 95%);\n  --muted-fg:      hsl(200 10% 46%);\n  --accent:        hsl(180 18% 95%);\n  --accent-fg:     hsl(200 25% 12%);\n  --destructive:   hsl(0 84.2% 60.2%);\n\n  /* Premium accents — rare; flag high-value moments */\n  --accent-gold:       hsl(40 65% 50%);\n  --accent-teal-light: hsl(184 60% 92%);\n\n  /* ---------- COACHING TEAL SCALE (brand) ---------- */\n  --coaching-50:  #e6f5f6;\n  --coaching-100: #ccebee;\n  --coaching-200: #99d7dd;\n  --coaching-300: #5cbcc5;\n  --coaching-400: #2a9aa5;\n  --coaching-500: #0d6f7a;   /* primary */\n  --coaching-600: #0b5e68;\n  --coaching-700: #094d55;\n  --coaching-800: #073c43;\n  --coaching-900: #052b30;\n  --coaching-950: #031a1d;   /* marketing hero bg */\n\n  /* ---------- SEMANTIC CONTENT-TYPE COLORS ---------- */\n  /* Each thread-entry type in the coaching feed has its own tint.\n     Pulled from /demo page Card borders/backgrounds. */\n  --entry-session:    var(--coaching-100);     /* bg */\n  --entry-session-fg: var(--coaching-700);\n\n  --entry-analysis-bg: hsl(270 60% 96%);       /* purple-100 — IFS / AI analysis */\n  --entry-analysis-fg: hsl(270 50% 45%);       /* purple-600 */\n\n  --entry-note-bg:     hsl(45 100% 94%);       /* amber-50 — coach note */\n  --entry-note-fg:     hsl(35 80% 40%);        /* amber-600 */\n\n  --entry-claude-bg:   hsl(184 60% 92%);       /* coaching-100 — supervisor reply */\n  --entry-claude-fg:   hsl(184 82% 26%);\n\n  --entry-reflect-bg:  hsl(150 55% 94%);       /* emerald-50 */\n  --entry-reflect-fg:  hsl(155 60% 35%);       /* emerald-600 */\n\n  /* ---------- ELEVATION ---------- */\n  --shadow-card:        0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.03);\n  --shadow-card-hover:  0 2px 8px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.06);\n  --shadow-elevated:    0 4px 16px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.04);\n  --shadow-xs:          0 1px 2px rgba(0,0,0,.04);\n\n  /* ---------- RADII ---------- */\n  --radius-sm: 0.375rem;   /*  6px — badges, tags */\n  --radius:    0.625rem;   /* 10px — buttons, inputs (shadcn default) */\n  --radius-lg: 0.75rem;    /* 12px — cards */\n  --radius-xl: 1rem;       /* 16px — hero cards, modals */\n  --radius-full: 9999px;   /* pills, avatars, FABs */\n\n  /* ---------- SPACING (matches tailwind scale) ---------- */\n  --space-1: 0.25rem;\n  --space-2: 0.5rem;\n  --space-3: 0.75rem;\n  --space-4: 1rem;\n  --space-5: 1.25rem;\n  --space-6: 1.5rem;\n  --space-8: 2rem;\n  --space-10: 2.5rem;\n  --space-12: 3rem;\n  --space-16: 4rem;\n\n  /* ---------- TYPE FAMILIES ---------- */\n  /* The codebase uses Inter for UI/body and Crimson Text (serif) for H1/H2/H3 — \"editorial\" voice */\n  --font-sans:  'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;\n  --font-serif: 'Crimson Text', Georgia, 'Times New Roman', serif;\n  --font-mono:  ui-monospace, 'Geist Mono', SFMono-Regular, Menlo, Consolas, monospace;\n\n  /* ---------- TYPE SCALE (semantic) ---------- */\n  /* H1–H3 use serif, semibold, negative tracking, tight leading — editorial feel.\n     H4+ and body use Inter. */\n\n  /* Display / page titles */\n  --h1-font: var(--font-serif);\n  --h1-size-sm: 2.25rem;  /* 36px */\n  --h1-size: 3rem;        /* 48px lg+ */\n  --h1-weight: 600;\n  --h1-tracking: -0.025em;\n  --h1-leading: 1.1;\n\n  --h2-font: var(--font-serif);\n  --h2-size-sm: 1.5rem;   /* 24px */\n  --h2-size: 1.875rem;    /* 30px lg+ */\n  --h2-weight: 600;\n  --h2-tracking: -0.02em;\n  --h2-leading: 1.2;\n\n  --h3-font: var(--font-serif);\n  --h3-size-sm: 1.25rem;  /* 20px */\n  --h3-size: 1.5rem;      /* 24px lg+ */\n  --h3-weight: 600;\n  --h3-tracking: -0.015em;\n  --h3-leading: 1.25;\n\n  --h4-font: var(--font-sans);\n  --h4-size: 1.125rem;    /* 18px */\n  --h4-weight: 600;\n  --h4-tracking: -0.01em;\n\n  --h5-font: var(--font-sans);\n  --h5-size: 1rem;        /* 16px */\n  --h5-weight: 600;\n\n  /* Body / UI */\n  --p-font: var(--font-sans);\n  --p-size: 0.875rem;     /* 14px — default body */\n  --p-leading: 1.625;     /* ~leading-relaxed */\n  --p-weight: 400;\n\n  --p-lg-size: 1.125rem;  /* 18px — marketing lede */\n  --p-lg-leading: 1.625;\n\n  /* Eyebrows / labels (used across dashboard sections) */\n  --eyebrow-size: 0.75rem;       /* 12px */\n  --eyebrow-weight: 600;\n  --eyebrow-tracking: 0.08em;\n  --eyebrow-transform: uppercase;\n  --eyebrow-color: var(--muted-fg);\n\n  /* UI micro-text */\n  --xs-size: 0.75rem;   /* 12px — meta, captions, timestamps */\n  --tiny-size: 0.625rem;/* 10px — uppercase pill labels in chat bubbles */\n\n  /* Code */\n  --code-font: var(--font-mono);\n  --code-size: 0.8125rem; /* 13px */\n}\n\n/* ---------- DARK MODE ---------- */\n.dark, [data-theme=\"dark\"] {\n  --bg:            hsl(210 15% 8%);\n  --fg:            hsl(200 15% 92%);\n  --fg-muted:      hsl(200 10% 58%);\n  --card:          hsl(210 12% 11%);\n  --card-fg:       hsl(200 15% 92%);\n  --popover:       hsl(210 12% 11%);\n  --border:        hsl(210 10% 18%);\n  --input:         hsl(210 10% 18%);\n  --ring:          hsl(184 65% 45%);\n  --primary:       hsl(184 65% 45%);\n  --primary-fg:    hsl(200 25% 8%);\n  --secondary:     hsl(210 10% 15%);\n  --secondary-fg:  hsl(200 15% 92%);\n  --muted:         hsl(210 10% 15%);\n  --muted-fg:      hsl(200 10% 58%);\n  --accent:        hsl(210 10% 15%);\n  --accent-fg:     hsl(200 15% 92%);\n  --accent-gold:       hsl(40 55% 55%);\n  --accent-teal-light: hsl(184 40% 18%);\n\n  --shadow-card:        0 1px 3px rgba(0,0,0,.2), 0 4px 12px rgba(0,0,0,.15);\n  --shadow-card-hover:  0 2px 8px rgba(0,0,0,.25), 0 8px 24px rgba(0,0,0,.2);\n  --shadow-elevated:    0 4px 16px rgba(0,0,0,.3), 0 12px 40px rgba(0,0,0,.2);\n}\n\n/* ---------- DEFAULT APPLICATION ---------- */\nhtml { font-family: var(--font-sans); color: var(--fg); background: var(--bg); }\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--p-size);\n  line-height: var(--p-leading);\n  color: var(--fg);\n  background: var(--bg);\n  /* The real app layers two soft radial teal tints at 20%,0% and 80%,100% */\n  background-image:\n    radial-gradient(ellipse at 20% 0%,   hsla(184, 82%, 26%, 0.03) 0%, transparent 50%),\n    radial-gradient(ellipse at 80% 100%, hsla(184, 82%, 26%, 0.02) 0%, transparent 50%);\n  background-attachment: fixed;\n  -webkit-font-smoothing: antialiased;\n}\n\nh1, h2, h3 { font-family: var(--font-serif); font-weight: 600; letter-spacing: var(--h2-tracking); }\nh1 { font-size: var(--h1-size-sm); line-height: var(--h1-leading); letter-spacing: var(--h1-tracking); }\nh2 { font-size: var(--h2-size-sm); line-height: var(--h2-leading); letter-spacing: var(--h2-tracking); }\nh3 { font-size: var(--h3-size-sm); line-height: var(--h3-leading); letter-spacing: var(--h3-tracking); }\nh4 { font-family: var(--font-sans); font-size: var(--h4-size); font-weight: var(--h4-weight); letter-spacing: var(--h4-tracking); }\nh5 { font-family: var(--font-sans); font-size: var(--h5-size); font-weight: var(--h5-weight); }\np  { font-family: var(--font-sans); font-size: var(--p-size); line-height: var(--p-leading); }\n\n@media (min-width: 1024px) {\n  h1 { font-size: var(--h1-size); }\n  h2 { font-size: var(--h2-size); }\n  h3 { font-size: var(--h3-size); }\n}\n\n.eyebrow {\n  font-size: var(--eyebrow-size);\n  font-weight: var(--eyebrow-weight);\n  text-transform: var(--eyebrow-transform);\n  letter-spacing: var(--eyebrow-tracking);\n  color: var(--eyebrow-color);\n}\n\ncode, pre { font-family: var(--code-font); font-size: var(--code-size); }\n<\u002Fstyle>\n<script src=\"1068b59a-d25f-461d-9569-f465d50d56fb\"><\u002Fscript>\n\n<style>\n  :root {\n    --paper: hsl(42 32% 96%);\n    --paper-soft: hsl(42 38% 97.8%);\n    --paper-deep: hsl(40 28% 92%);\n    --ink: #2a221b;\n    --ink-soft: #3f3428;\n    --ink-mute: #5a4e3e;\n    --ink-quiet: #7a6e58;\n    --line: #ddd0b2;\n    --line-soft: #e8ddc2;\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { background: var(--paper); color: var(--ink); font-family: var(--font-sans); font-size: 15px; line-height: 1.65; }\n\n  /* NAV */\n  .nav { position: sticky; top: 0; z-index: 50; background: hsla(42,32%,96%,.94); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); }\n  .nav-in { max-width: 1200px; margin: 0 auto; padding: 14px 40px; display: flex; align-items: center; gap: 28px; }\n  .logo { font-family: var(--font-serif); font-size: 19px; font-weight: 600; color: var(--ink); letter-spacing: -0.012em; }\n  .logo em { font-style: italic; color: var(--coaching-700); }\n  .nav-links { display: flex; gap: 26px; margin-left: auto; align-items: center; }\n  .nav-links a { color: var(--ink-mute); text-decoration: none; font-size: 13.5px; font-weight: 500; }\n  .nav-links a:hover { color: var(--ink); }\n  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 8px; font: inherit; font-size: 13.5px; font-weight: 500; cursor: pointer; border: 1px solid transparent; text-decoration: none; line-height: 1; white-space: nowrap; }\n  .btn svg { width: 13px; height: 13px; }\n  .btn.prim { background: var(--coaching-700); color: #fff; }\n  .btn.prim:hover { background: var(--coaching-800); }\n  .btn.lg { padding: 14px 24px; font-size: 14.5px; border-radius: 10px; }\n\n  /* MASTHEAD — NEWSPAPER STYLE */\n  .masthead { padding: 28px 40px 18px; max-width: 1200px; margin: 0 auto; border-bottom: 3px double var(--ink); display: flex; justify-content: space-between; align-items: flex-end; gap: 18px; }\n  .mh-l { font-family: var(--font-mono); font-size: 11px; color: var(--ink-quiet); letter-spacing: .14em; text-transform: uppercase; }\n  .mh-c { font-family: var(--font-serif); font-size: 14px; font-style: italic; color: var(--ink-mute); }\n  .mh-r { font-family: var(--font-mono); font-size: 11px; color: var(--ink-quiet); letter-spacing: .12em; text-transform: uppercase; }\n\n  /* HERO — TWO COLUMN EDITORIAL */\n  .hero { max-width: 1200px; margin: 0 auto; padding: 28px 40px 90px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 72px; align-items: start; }\n  .hero-eye { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: .14em; color: var(--coaching-700); text-transform: uppercase; margin-bottom: 22px; }\n  .hero h1 { font-family: var(--font-serif); font-size: clamp(46px, 5.6vw, 76px); font-weight: 500; letter-spacing: -0.028em; line-height: 1.02; color: var(--ink); margin: 0 0 28px; }\n  .hero h1 em { font-style: italic; color: var(--coaching-700); }\n  .hero h1 .strike { position: relative; display: inline-block; color: var(--ink-quiet); }\n  .hero h1 .strike::after { content: ''; position: absolute; left: -2%; right: -2%; top: 56%; height: 3px; background: var(--coaching-700); transform: rotate(-1deg); }\n  .hero-lede { font-family: var(--font-serif); font-size: 22px; font-style: italic; color: var(--ink-mute); line-height: 1.5; max-width: 28ch; margin: 0 0 32px; }\n  .hero-cta { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 36px; }\n  .hero-meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-quiet); letter-spacing: .04em; }\n  .hero-sig { padding: 18px 0 0; border-top: 1px dashed var(--line); display: flex; align-items: center; gap: 14px; }\n  .sig-avs { display: flex; }\n  .sig-avs .av { width: 30px; height: 30px; border-radius: 999px; border: 2px solid var(--paper); margin-left: -8px; display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-weight: 700; font-size: 12px; }\n  .sig-avs .av:first-child { margin-left: 0; background: hsl(35 60% 88%); color: hsl(35 70% 30%); }\n  .sig-avs .av:nth-child(2) { background: hsl(184 30% 88%); color: var(--coaching-700); }\n  .hero-sig-text { font-family: var(--font-serif); font-style: italic; font-size: 13.5px; color: var(--ink-mute); }\n  .hero-sig-text strong { font-style: normal; color: var(--ink); font-weight: 600; }\n\n  /* RIGHT COLUMN — sample reflection card */\n  .hero-card { background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 1px 0 #e8dcc0, 6px 8px 0 -4px var(--paper-deep); padding: 22px 24px; transform: rotate(-0.4deg); }\n  .hero-card .corner { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-quiet); letter-spacing: .14em; text-transform: uppercase; display: flex; justify-content: space-between; margin-bottom: 12px; }\n  .hero-card .corner .pill { background: hsl(184 30% 92%); color: var(--coaching-700); padding: 2px 8px; border-radius: 999px; border: 1px solid var(--coaching-200); font-weight: 600; }\n  .hero-card .ttl { font-family: var(--font-serif); font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 10px; letter-spacing: -0.01em; }\n  .hero-card .ttl em { font-style: italic; color: var(--coaching-700); }\n  .hero-card .body { font-family: var(--font-serif); font-size: 14.5px; color: var(--ink-soft); line-height: 1.65; margin: 0 0 14px; }\n  .hero-card .pull { border-left: 3px solid var(--coaching-500); padding: 6px 0 6px 14px; font-family: var(--font-serif); font-style: italic; font-size: 14.5px; color: var(--ink); line-height: 1.5; margin: 0; }\n  .hero-card .meta { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }\n  .hero-card .meta span { font-family: var(--font-mono); font-size: 9.5px; color: var(--coaching-700); background: hsl(184 30% 94%); padding: 2px 8px; border-radius: 999px; border: 1px solid var(--coaching-200); letter-spacing: .04em; }\n  .marg { font-family: var(--font-serif); font-style: italic; font-size: 12.5px; color: var(--ink-quiet); margin-top: 14px; padding-left: 14px; border-left: 2px solid var(--line); }\n\n  /* SECTION */\n  .sec { padding: 90px 40px; max-width: 1200px; margin: 0 auto; }\n  .sec.deep { background: var(--paper-deep); max-width: none; padding-left: 40px; padding-right: 40px; }\n  .sec.deep .inner { max-width: 1200px; margin: 0 auto; }\n  .sec-head { display: grid; grid-template-columns: 220px 1fr; gap: 56px; margin-bottom: 48px; align-items: start; }\n  .sec-head .label { font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; letter-spacing: .14em; color: var(--coaching-700); text-transform: uppercase; padding-top: 8px; border-top: 2px solid var(--coaching-700); display: flex; flex-direction: column; gap: 6px; }\n  .sec-head .label .num { font-family: var(--font-serif); font-style: italic; font-size: 16px; color: var(--ink-quiet); letter-spacing: 0; text-transform: none; font-weight: 400; }\n  .sec-head h2 { font-family: var(--font-serif); font-size: clamp(34px, 4vw, 50px); font-weight: 500; letter-spacing: -0.022em; line-height: 1.1; color: var(--ink); margin: 0; max-width: 22ch; }\n  .sec-head h2 em { font-style: italic; color: var(--coaching-700); }\n  .sec-lede { font-family: var(--font-serif); font-size: 19px; line-height: 1.65; color: var(--ink-mute); max-width: 56ch; margin: 0 0 0 276px; }\n  .sec-lede em { font-style: italic; color: var(--coaching-800); }\n  .sec-lede strong { color: var(--ink); font-weight: 600; }\n\n  /* WHAT IT DOES — TWO MOMENTS WITH UI */\n  .moments { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 56px; }\n  .moment { background: #fff; border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 1px 0 #e8dcc0; overflow: hidden; }\n  .moment-eye { padding: 18px 26px 0; font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: .14em; color: var(--coaching-700); text-transform: uppercase; }\n  .moment h3 { padding: 4px 26px 8px; font-family: var(--font-serif); font-size: 26px; font-weight: 500; letter-spacing: -0.018em; line-height: 1.2; margin: 0; color: var(--ink); }\n  .moment h3 em { font-style: italic; color: var(--coaching-700); }\n  .moment .copy { padding: 0 26px 18px; font-family: var(--font-serif); font-size: 16px; line-height: 1.6; color: var(--ink-mute); margin: 0; }\n  .moment .ui { background: hsl(180 12% 95% / 0.4); border-top: 1px solid var(--line-soft); padding: 22px 26px; }\n  /* Mini app frame inside moment */\n  .ui-frame { background: #fff; border: 1px solid var(--coaching-100); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }\n  .ui-bar { display: flex; gap: 6px; padding: 8px 12px; background: hsl(184 30% 96%); border-bottom: 1px solid var(--coaching-100); align-items: center; }\n  .ui-bar .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--coaching-200); }\n  .ui-bar .ttl { flex: 1; text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--coaching-400); letter-spacing: .04em; }\n  .ui-body { padding: 16px 18px; }\n  .ui-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px dashed var(--line-soft); }\n  .ui-row:last-child { border-bottom: none; }\n  .ui-row .ic { width: 22px; height: 22px; border-radius: 6px; background: hsl(184 30% 92%); color: var(--coaching-700); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }\n  .ui-row .ic svg { width: 11px; height: 11px; }\n  .ui-row .t { font-family: var(--font-serif); font-size: 13px; color: var(--ink); line-height: 1.45; font-weight: 500; }\n  .ui-row .t em { font-style: italic; color: var(--coaching-700); }\n  .ui-row .s { font-family: var(--font-serif); font-size: 12.5px; color: var(--ink-mute); line-height: 1.5; margin-top: 2px; }\n\n  /* PRIVACY VIZ */\n  .priv-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 22px; align-items: stretch; margin-top: 36px; }\n  .priv-card { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 22px 24px; }\n  .priv-card.r { background: hsl(184 30% 97%); border-color: var(--coaching-200); }\n  .priv-card .h { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: .14em; color: var(--ink-quiet); text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }\n  .priv-card.r .h { color: var(--coaching-700); }\n  .priv-card .h svg { width: 11px; height: 11px; }\n  .priv-card .row { font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft); line-height: 1.85; }\n  .priv-card .row .k { color: var(--ink-quiet); }\n  .priv-card .row .v { background: hsl(40 70% 88%); color: hsl(35 70% 25%); padding: 1px 6px; border-radius: 4px; }\n  .priv-card.r .row .v { background: hsl(184 30% 90%); color: var(--coaching-800); }\n  .priv-card .quote { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--line-soft); font-family: var(--font-serif); font-style: italic; font-size: 14px; color: var(--ink-mute); line-height: 1.55; }\n  .priv-card.r .quote { border-top-color: var(--coaching-200); }\n  .priv-arrow { display: flex; align-items: center; justify-content: center; color: var(--coaching-700); font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; }\n  .priv-arrow .ar { display: flex; flex-direction: column; align-items: center; gap: 8px; }\n  .priv-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 28px; }\n  .pill { font-family: var(--font-mono); font-size: 11px; padding: 6px 12px; border-radius: 999px; background: #fff; border: 1px solid var(--line); color: var(--ink-mute); display: inline-flex; align-items: center; gap: 6px; letter-spacing: .04em; }\n  .pill svg { width: 11px; height: 11px; color: var(--coaching-600); }\n\n  /* SAMPLE — full reflection */\n  .reflect { background: #fff; border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 1px 0 #e8dcc0; overflow: hidden; margin-top: 28px; max-width: 880px; margin-left: 276px; }\n  .reflect-hd { padding: 18px 28px; border-bottom: 1px dashed var(--line); display: flex; align-items: center; gap: 12px; background: var(--paper-soft); }\n  .reflect-hd .av { width: 34px; height: 34px; border-radius: 999px; background: hsl(184 30% 88%); color: var(--coaching-700); display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-weight: 700; font-size: 13px; }\n  .reflect-hd .nm { font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: var(--ink); }\n  .reflect-hd .mt { font-family: var(--font-mono); font-size: 11px; color: var(--ink-quiet); letter-spacing: .04em; }\n  .reflect-bd { padding: 32px 38px; }\n  .reflect-bd h4 { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: .14em; color: var(--coaching-700); text-transform: uppercase; margin: 0 0 8px; }\n  .reflect-bd .body { font-family: var(--font-serif); font-size: 17px; line-height: 1.7; color: var(--ink-soft); margin: 0 0 26px; }\n  .reflect-bd .body em { font-style: italic; color: var(--coaching-800); }\n  .reflect-bd .body strong { font-weight: 600; color: var(--ink); }\n  .reflect-bd .pull { border-left: 3px solid var(--coaching-500); padding: 8px 0 8px 18px; font-family: var(--font-serif); font-style: italic; font-size: 17.5px; color: var(--ink); line-height: 1.55; margin: 22px 0; }\n  .reflect-meta { padding: 14px 28px; border-top: 1px dashed var(--line); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: var(--paper-soft); font-family: var(--font-mono); font-size: 11px; color: var(--ink-quiet); letter-spacing: .04em; }\n  .reflect-meta .pill-mini { background: hsl(184 30% 92%); color: var(--coaching-700); padding: 2px 8px; border-radius: 999px; border: 1px solid var(--coaching-200); font-size: 10px; }\n\n  /* PERSONAS */\n  .personas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin-top: 48px; margin-left: 276px; }\n  .persona { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 28px 24px; }\n  .persona .pic { width: 44px; height: 44px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-weight: 700; font-size: 16px; margin-bottom: 14px; }\n  .persona .nm { font-family: var(--font-serif); font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }\n  .persona .role { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-quiet); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 14px; }\n  .persona .why { font-family: var(--font-serif); font-size: 14.5px; line-height: 1.6; color: var(--ink-mute); font-style: italic; }\n  .persona .why em { font-style: normal; color: var(--ink); font-weight: 600; }\n\n  /* WHY / FOUNDERS */\n  .founders { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 36px; }\n  .founder { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 32px; }\n  .founder .av { width: 56px; height: 56px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-weight: 700; font-size: 20px; margin-bottom: 16px; }\n  .founder .nm { font-family: var(--font-serif); font-size: 22px; font-weight: 500; color: var(--ink); margin-bottom: 4px; letter-spacing: -0.012em; }\n  .founder .nm em { font-style: italic; color: var(--coaching-700); }\n  .founder .cred { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-quiet); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 16px; }\n  .founder .blurb { font-family: var(--font-serif); font-size: 15.5px; line-height: 1.6; color: var(--ink-mute); font-style: italic; margin: 0; }\n\n  /* FAQ */\n  .faq-list { margin-top: 28px; max-width: 800px; margin-left: 276px; }\n  .faq-item { border-bottom: 1px solid var(--line); padding: 22px 0; cursor: pointer; }\n  .faq-item:last-child { border-bottom: none; }\n  .faq-q { font-family: var(--font-serif); font-size: 19px; font-weight: 500; color: var(--ink); display: flex; align-items: center; justify-content: space-between; gap: 18px; line-height: 1.35; letter-spacing: -0.012em; }\n  .faq-q em { font-style: italic; color: var(--coaching-700); }\n  .faq-q .ic { color: var(--ink-quiet); flex-shrink: 0; transition: transform .2s; }\n  .faq-q .ic svg { width: 16px; height: 16px; }\n  .faq-item.open .faq-q .ic { transform: rotate(45deg); color: var(--coaching-700); }\n  .faq-a { font-family: var(--font-serif); font-size: 16px; line-height: 1.7; color: var(--ink-mute); margin: 14px 0 0; max-width: 56ch; display: none; }\n  .faq-a em { font-style: italic; color: var(--coaching-800); }\n  .faq-item.open .faq-a { display: block; }\n\n  /* FINAL CTA */\n  .final { padding: 110px 40px; text-align: center; border-top: 1px solid var(--line); background: var(--paper-deep); }\n  .final h2 { font-family: var(--font-serif); font-size: clamp(38px, 5vw, 60px); font-weight: 500; letter-spacing: -0.025em; line-height: 1.08; color: var(--ink); margin: 0 0 18px; max-width: 18ch; margin-left: auto; margin-right: auto; }\n  .final h2 em { font-style: italic; color: var(--coaching-700); }\n  .final p { font-family: var(--font-serif); font-size: 18px; font-style: italic; color: var(--ink-mute); max-width: 50ch; margin: 0 auto 32px; line-height: 1.55; }\n  .final .micro { font-family: var(--font-mono); font-size: 11px; color: var(--ink-quiet); letter-spacing: .04em; margin-top: 18px; }\n\n  /* FOOTER */\n  .ftr { padding: 36px 40px 56px; border-top: 1px dashed var(--line); }\n  .ftr-in { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 18px; }\n  .ftr-l { font-family: var(--font-mono); font-size: 11px; color: var(--ink-quiet); letter-spacing: .04em; }\n  .ftr-l em { font-family: var(--font-serif); font-style: italic; color: var(--ink-mute); font-size: 13px; }\n  .ftr-r { display: flex; gap: 18px; }\n  .ftr-r a { color: var(--ink-quiet); text-decoration: none; font-size: 12px; font-family: var(--font-mono); letter-spacing: .04em; }\n  .ftr-r a:hover { color: var(--ink); }\n\n  /* TWEAKS */\n  #tweaks { display: none; }\n  #tweaks.on { display: flex; position: fixed; bottom: 18px; right: 18px; z-index: 200; background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; gap: 10px; align-items: center; box-shadow: 0 4px 16px rgba(50,40,30,.12); font-family: var(--font-serif); font-size: 13px; }\n  #tweaks .lab { font-family: var(--font-mono); font-size: 10px; color: var(--ink-quiet); letter-spacing: .12em; text-transform: uppercase; }\n  #tweaks button { font: inherit; font-size: 12px; padding: 5px 10px; border: 1px solid var(--line); background: transparent; border-radius: 6px; cursor: pointer; color: var(--ink-mute); }\n  #tweaks button.on { background: var(--coaching-700); color: #fff; border-color: var(--coaching-700); }\n<\u002Fstyle>\n<\u002Fhead>\n<body data-screen-label=\"Landing · B · Practice Journal\">\n\n<nav class=\"nav\">\n  <div class=\"nav-in\">\n    <div class=\"logo\">Coach <em>Claude<\u002Fem><\u002Fdiv>\n    <div class=\"nav-links\">\n      <a href=\"#practice\">The practice<\u002Fa>\n      <a href=\"#privacy\">Privacy<\u002Fa>\n      <a href=\"#sample\">A reflection<\u002Fa>\n      <a href=\"#why\">Who built it<\u002Fa>\n      <a href=\"#faq\">FAQ<\u002Fa>\n      <a class=\"btn prim\" href=\"#book\">Request a walkthrough<i data-lucide=\"arrow-right\"><\u002Fi><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n\n<!-- HERO -->\n<header class=\"hero\">\n  <div>\n    <div class=\"hero-eye\">For coaches who take their craft seriously<\u002Fdiv>\n    <div style=\"display:inline-flex;align-items:center;gap:10px;padding:7px 14px;background:hsl(184 30% 96%);border:1px solid var(--coaching-200);border-radius:999px;font-family:var(--font-serif);font-size:14.5px;font-style:italic;color:var(--coaching-800);margin-bottom:24px\"><i data-lucide=\"sparkle\" style=\"width:13px;height:13px;color:var(--coaching-700)\"><\u002Fi> The AI that makes your coaching <b style=\"font-style:normal;font-weight:600;color:var(--coaching-700)\">sharper<\u002Fb> — not optional.<\u002Fdiv>\n    <h1 id=\"headline\">\n      Every other AI tool is trying to <span style=\"color:var(--ink-mute)\">replace coaches<\u002Fspan>.<br>\n      We built this to make ourselves <em>irreplaceable<\u002Fem>.\n    <\u002Fh1>\n    <p class=\"hero-lede\">A supervisor in your pocket — <em style=\"font-style:normal;color:var(--ink);font-weight:600\">not<\u002Fem> a chatbot for your clients. A thinking partner for the coach behind them.<\u002Fp>\n    <div class=\"hero-cta\">\n      <a class=\"btn prim lg\" href=\"#book\"><i data-lucide=\"arrow-right\"><\u002Fi>Request a walkthrough<\u002Fa>\n      <span class=\"hero-meta\">30 spots this quarter · we onboard every coach personally<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"hero-sig\">\n      <div class=\"sig-avs\"><div class=\"av\">D<\u002Fdiv><div class=\"av\">A<\u002Fdiv><\u002Fdiv>\n      <div class=\"hero-sig-text\">From <strong>Dan Putt<\u002Fstrong> (co-founder, Reboot.io) and <strong>Ayman Al-Abdullah<\u002Fstrong> (former CEO, AppSumo) — <em>two coaches holding the door open<\u002Fem>.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <aside>\n    <div class=\"hero-card\" data-style=\"depth\">\n      <div class=\"corner\"><span><span class=\"corner-style\">a real reflection<\u002Fspan><\u002Fspan><span class=\"pill\">supervision<\u002Fspan><\u002Fdiv>\n      <div class=\"ttl\">The pattern, <em>named<\u002Fem>.<\u002Fdiv>\n      <p class=\"body\">Your client arrived with a concrete agenda — the restructure — and within ten minutes the conversation had migrated to a colleague. <em>Third time this month.<\u002Fem> Each time, the pivot is theirs. Each time, you both treat it as a digression.<\u002Fp>\n      <p class=\"pull\">The restructure is the container. The relationship is the work.<\u002Fp>\n      <div class=\"meta\"><span>pacing<\u002Fspan><span>recurring pivot<\u002Fspan><span>question almost not asked<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"marg\" id=\"hero-card-cap\">↑ <em>One real reflection.<\u002Fem> Generated 22 minutes after the session ended. <a href=\"#\" id=\"rotate-style\" style=\"color:var(--coaching-700);text-decoration:underline dotted;cursor:pointer\">See a tactical or systemic read →<\u002Fa><\u002Fdiv>\n  <\u002Faside>\n<\u002Fheader>\n\n<!-- PRIVACY STRIP — visual proof -->\n<section style=\"max-width:1200px;margin:0 auto;padding:0 40px 80px;\">\n  <div style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:32px 36px;\">\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px\">\n      <div style=\"width:42px;height:42px;border-radius:10px;background:hsl(184 30% 92%);color:var(--coaching-700);display:flex;align-items:center;justify-content:center;\"><i data-lucide=\"shield-check\" style=\"width:20px;height:20px\"><\u002Fi><\u002Fdiv>\n      <div>\n        <div style=\"font-family:var(--font-mono);font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--coaching-700);text-transform:uppercase\">Your client's privacy — first<\u002Fdiv>\n        <div style=\"font-family:var(--font-serif);font-style:italic;font-size:17.5px;color:var(--ink);margin-top:2px\">Your clients trust you with things they can't say elsewhere. <em style=\"color:var(--coaching-800)\">We treat that trust the way you do.<\u002Fem><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:stretch;margin-top:18px\">\n      <div style=\"background:hsl(40 60% 96%);border:1px solid var(--line);border-radius:12px;padding:18px 22px\">\n        <div style=\"font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--ink-quiet);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px\"><i data-lucide=\"eye\" style=\"width:11px;height:11px\"><\u002Fi> What you see in Coach Claude<\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:12.5px;line-height:1.85;color:var(--ink)\">\n          <div><span style=\"color:var(--ink-quiet)\">name:<\u002Fspan> <span style=\"background:hsl(40 70% 86%);padding:2px 6px;border-radius:3px\">Alex Chen<\u002Fspan><\u002Fdiv>\n          <div><span style=\"color:var(--ink-quiet)\">email:<\u002Fspan> <span style=\"background:hsl(40 70% 86%);padding:2px 6px;border-radius:3px\">alex@acmecorp.com<\u002Fspan><\u002Fdiv>\n          <div><span style=\"color:var(--ink-quiet)\">role:<\u002Fspan> <span style=\"background:hsl(40 70% 86%);padding:2px 6px;border-radius:3px\">CEO, Acme Corp<\u002Fspan><\u002Fdiv>\n          <div><span style=\"color:var(--ink-quiet)\">session:<\u002Fspan> <span style=\"color:var(--ink-mute)\">“…the board meeting felt different…”<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;color:var(--coaching-700);flex-direction:column;gap:6px\">\n        <i data-lucide=\"arrow-right\" style=\"width:22px;height:22px\"><\u002Fi>\n        <span style=\"font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-quiet)\">tokenized<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"background:hsl(184 30% 96%);border:1px solid var(--coaching-200);border-radius:12px;padding:18px 22px\">\n        <div style=\"font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--coaching-700);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px\"><i data-lucide=\"lock\" style=\"width:11px;height:11px\"><\u002Fi> What Anthropic sees<\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:12.5px;line-height:1.85;color:var(--ink)\">\n          <div><span style=\"color:var(--ink-quiet)\">name:<\u002Fspan> <span style=\"background:hsl(184 30% 88%);padding:2px 6px;border-radius:3px;color:var(--coaching-800)\">Client_7f3a<\u002Fspan><\u002Fdiv>\n          <div><span style=\"color:var(--ink-quiet)\">email:<\u002Fspan> <span style=\"background:hsl(184 30% 88%);padding:2px 6px;border-radius:3px;color:var(--coaching-800)\">[redacted]<\u002Fspan><\u002Fdiv>\n          <div><span style=\"color:var(--ink-quiet)\">role:<\u002Fspan> <span style=\"background:hsl(184 30% 88%);padding:2px 6px;border-radius:3px;color:var(--coaching-800)\">Senior_Exec<\u002Fspan><\u002Fdiv>\n          <div><span style=\"color:var(--ink-quiet)\">session:<\u002Fspan> <span style=\"color:var(--ink-mute)\">“…the meeting felt different…”<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-top:22px;padding-top:18px;border-top:1px dashed var(--line-soft);font-family:var(--font-serif);font-size:14px;color:var(--ink-mute)\">\n      <div style=\"display:flex;gap:24px;flex-wrap:wrap\">\n        <span style=\"display:inline-flex;align-items:center;gap:6px\"><i data-lucide=\"check\" style=\"width:13px;height:13px;color:var(--coaching-700)\"><\u002Fi> Encrypted at rest (AES-256-GCM)<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px\"><i data-lucide=\"check\" style=\"width:13px;height:13px;color:var(--coaching-700)\"><\u002Fi> Zero data retention with Claude API<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px\"><i data-lucide=\"check\" style=\"width:13px;height:13px;color:var(--coaching-700)\"><\u002Fi> Your data, your account<\u002Fspan>\n      <\u002Fdiv>\n      <a href=\"#privacy\" style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;color:var(--coaching-700);text-decoration:none;border:1px solid var(--coaching-200);padding:8px 14px;border-radius:999px;white-space:nowrap\">Read the full privacy story →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- supervision callout -->\n  <div style=\"max-width:880px;margin:36px auto 0;padding:24px 28px;background:transparent;border-left:3px solid var(--coaching-700);font-family:var(--font-serif);font-style:italic;font-size:18px;line-height:1.55;color:var(--ink)\">\n    “Coach Claude doesn't replace your supervisor. <em style=\"color:var(--coaching-700)\">It makes you better prepared for them.<\u002Fem>”\n    <div style=\"font-family:var(--font-sans);font-style:normal;font-size:12.5px;color:var(--ink-quiet);letter-spacing:.04em;margin-top:8px\">— the line we keep coming back to in our own practice<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WORKFLOW — BEFORE / AFTER -->\n<section class=\"sec\" id=\"workflow\">\n  <div class=\"sec-head\">\n    <div class=\"label\"><span>§ 01 · The problem<\u002Fspan><span class=\"num\">what we couldn't stop noticing<\u002Fspan><\u002Fdiv>\n    <h2>What happens <em>between<\u002Fem> sessions.<\u002Fh2>\n  <\u002Fdiv>\n  <p class=\"sec-lede\">Here's what we kept running into in our own practices: the work in the room is sharp, and then the gap opens. Two weeks of nothing. Maybe a journal entry. Patterns we'd been running for six sessions, unnamed. Supervision once a month if we were lucky. <em>We knew we were leaving things on the table.<\u002Fem><\u002Fp>\n\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:48px\">\n    <div style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:32px 28px;\">\n      <div style=\"font-family:var(--font-mono);font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--ink-quiet);text-transform:uppercase;margin-bottom:14px\">Before Coach Claude<\u002Fdiv>\n      <ol style=\"list-style:none;padding:0;margin:0;font-family:var(--font-serif);font-size:16.5px;line-height:1.55;color:var(--ink-mute)\">\n        <li style=\"padding:10px 0;border-bottom:1px dashed var(--line-soft);display:flex;gap:14px\"><span style=\"color:var(--ink-quiet);font-family:var(--font-mono);font-size:12px;flex-shrink:0;padding-top:4px\">01<\u002Fspan><span>Session ends. You jot a few notes if you have time.<\u002Fspan><\u002Fli>\n        <li style=\"padding:10px 0;border-bottom:1px dashed var(--line-soft);display:flex;gap:14px\"><span style=\"color:var(--ink-quiet);font-family:var(--font-mono);font-size:12px;flex-shrink:0;padding-top:4px\">02<\u002Fspan><span>You move on. The next client is in twenty minutes.<\u002Fspan><\u002Fli>\n        <li style=\"padding:10px 0;display:flex;gap:14px\"><span style=\"color:var(--ink-quiet);font-family:var(--font-mono);font-size:12px;flex-shrink:0;padding-top:4px\">03<\u002Fspan><span>Two weeks later you arrive at the next session half-prepared. Patterns you've been running for six sessions go unnamed.<\u002Fspan><\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n    <div style=\"background:hsl(184 28% 97%);border:1px solid var(--coaching-200);border-radius:14px;padding:32px 28px;\">\n      <div style=\"font-family:var(--font-mono);font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--coaching-700);text-transform:uppercase;margin-bottom:14px\">With Coach Claude<\u002Fdiv>\n      <ol style=\"list-style:none;padding:0;margin:0;font-family:var(--font-serif);font-size:16.5px;line-height:1.55;color:var(--ink-soft)\">\n        <li style=\"padding:10px 0;border-bottom:1px dashed var(--coaching-200);display:flex;gap:14px\"><span style=\"color:var(--coaching-700);font-family:var(--font-mono);font-weight:700;font-size:12px;flex-shrink:0;padding-top:4px\">01<\u002Fspan><span><strong style=\"font-weight:600;color:var(--ink)\">Record.<\u002Fstrong> Connect Granola, Fathom, or paste a transcript.<\u002Fspan><\u002Fli>\n        <li style=\"padding:10px 0;border-bottom:1px dashed var(--coaching-200);display:flex;gap:14px\"><span style=\"color:var(--coaching-700);font-family:var(--font-mono);font-weight:700;font-size:12px;flex-shrink:0;padding-top:4px\">02<\u002Fspan><span><strong style=\"font-weight:600;color:var(--ink)\">Reflect.<\u002Fstrong> Twenty minutes later — frameworks used, patterns emerging, blind spots surfacing.<\u002Fspan><\u002Fli>\n        <li style=\"padding:10px 0;display:flex;gap:14px\"><span style=\"color:var(--coaching-700);font-family:var(--font-mono);font-weight:700;font-size:12px;flex-shrink:0;padding-top:4px\">03<\u002Fspan><span><strong style=\"font-weight:600;color:var(--ink)\">Prepare.<\u002Fstrong> Before the next session, a briefing: where they are, what to watch for, the question to hold.<\u002Fspan><\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- THREE-STEP TIMELINE — the mechanism -->\n  <div style=\"margin-top:80px;padding-top:56px;border-top:1px solid var(--line)\">\n    <div style=\"text-align:center;margin-bottom:48px\">\n      <div style=\"font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--coaching-700);text-transform:uppercase;margin-bottom:14px\">How it works · the mechanism<\u002Fdiv>\n      <div style=\"font-family:var(--font-serif);font-size:32px;font-weight:500;letter-spacing:-0.018em;color:var(--ink);line-height:1.15\">Three steps. <em style=\"color:var(--coaching-700);font-style:italic\">Every session.<\u002Fem><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:0;align-items:stretch;max-width:1000px;margin:0 auto\">\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px 24px;text-align:center\">\n        <div style=\"width:52px;height:52px;border-radius:14px;background:hsl(184 30% 92%);color:var(--coaching-700);display:flex;align-items:center;justify-content:center;margin:0 auto 16px\"><i data-lucide=\"mic\" style=\"width:22px;height:22px\"><\u002Fi><\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--ink-quiet);text-transform:uppercase;margin-bottom:8px\">Step 01<\u002Fdiv>\n        <div style=\"font-family:var(--font-serif);font-size:24px;font-weight:500;color:var(--ink);margin-bottom:10px;letter-spacing:-0.012em\">Record<\u002Fdiv>\n        <div style=\"font-family:var(--font-serif);font-size:14.5px;line-height:1.5;color:var(--ink-mute)\">Connect Granola, Fathom, or paste a transcript. We work from finished transcripts — not live audio.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;color:var(--coaching-700);padding:0 8px\"><i data-lucide=\"arrow-right\" style=\"width:22px;height:22px\"><\u002Fi><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px 24px;text-align:center\">\n        <div style=\"width:52px;height:52px;border-radius:14px;background:hsl(270 50% 92%);color:hsl(270 50% 38%);display:flex;align-items:center;justify-content:center;margin:0 auto 16px\"><i data-lucide=\"book-open\" style=\"width:22px;height:22px\"><\u002Fi><\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--ink-quiet);text-transform:uppercase;margin-bottom:8px\">Step 02<\u002Fdiv>\n        <div style=\"font-family:var(--font-serif);font-size:24px;font-weight:500;color:var(--ink);margin-bottom:10px;letter-spacing:-0.012em\">Reflect<\u002Fdiv>\n        <div style=\"font-family:var(--font-serif);font-size:14.5px;line-height:1.5;color:var(--ink-mute)\">Twenty minutes after the session ends — frameworks used, patterns emerging, the move you might have missed.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;color:var(--coaching-700);padding:0 8px\"><i data-lucide=\"arrow-right\" style=\"width:22px;height:22px\"><\u002Fi><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px 24px;text-align:center\">\n        <div style=\"width:52px;height:52px;border-radius:14px;background:hsl(35 60% 92%);color:hsl(35 70% 30%);display:flex;align-items:center;justify-content:center;margin:0 auto 16px\"><i data-lucide=\"compass\" style=\"width:22px;height:22px\"><\u002Fi><\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--ink-quiet);text-transform:uppercase;margin-bottom:8px\">Step 03<\u002Fdiv>\n        <div style=\"font-family:var(--font-serif);font-size:24px;font-weight:500;color:var(--ink);margin-bottom:10px;letter-spacing:-0.012em\">Prepare<\u002Fdiv>\n        <div style=\"font-family:var(--font-serif);font-size:14.5px;line-height:1.5;color:var(--ink-mute)\">Before your next session, a briefing: where they are, what to watch for, the question to hold.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRACTICE — TWO MOMENTS WITH UI -->\n<section class=\"sec\" id=\"practice\" style=\"padding-top:30px\">\n  <div class=\"sec-head\">\n    <div class=\"label\"><span>§ 02 · The practice<\u002Fspan><span class=\"num\">two moments, every session<\u002Fspan><\u002Fdiv>\n    <h2>It reads <em>every<\u002Fem> session.<\u002Fh2>\n  <\u002Fdiv>\n  <p class=\"sec-lede\">Coaching happens in the room — you know that, we know that. But everything that <em>makes<\u002Fem> coaching good happens around it: the prep that lets you walk in oriented, the reflection that names what you couldn't see alone. Those two moments were the ones we kept dropping. <em>So that's where we started.<\u002Fem><\u002Fp>\n\n  <div class=\"moments\">\n    <div class=\"moment\">\n      <div class=\"moment-eye\">Before · pre-session prep<\u002Fdiv>\n      <h3>Walk in <em>oriented<\u002Fem>, not improvising.<\u002Fh3>\n      <p class=\"copy\">Thirty minutes before your next session, a brief lands — what's recurring, what shifted last time, what the client's nervous system has been doing across six conversations. Not a script. A frame.<\u002Fp>\n      <div class=\"ui\">\n        <div class=\"ui-frame\">\n          <div class=\"ui-bar\"><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"ttl\">pre-session brief · alex c.<\u002Fspan><\u002Fdiv>\n          <div class=\"ui-body\">\n            <div class=\"ui-row\"><div class=\"ic\"><i data-lucide=\"repeat\"><\u002Fi><\u002Fdiv><div><div class=\"t\">Recurring: <em>relational thread<\u002Fem> beneath organizational content<\u002Fdiv><div class=\"s\">Surfaced sessions 11, 12, 14. Pattern: pivots to Jordan within first 12 min.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div class=\"ui-row\"><div class=\"ic\"><i data-lucide=\"activity\"><\u002Fi><\u002Fdiv><div><div class=\"t\">Nervous system: ventral last session, <em>shifted<\u002Fem> at 0:21<\u002Fdiv><div class=\"s\">Body settled when restructure became relational. Worth following the body.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div class=\"ui-row\"><div class=\"ic\"><i data-lucide=\"alert-circle\"><\u002Fi><\u002Fdiv><div><div class=\"t\">Watch in yourself: <em>educator mode<\u002Fem> at moments of heat<\u002Fdiv><div class=\"s\">Last session you named the Manager part out loud at 0:34 — possibly your retreat.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"moment\">\n      <div class=\"moment-eye\">After · post-session analysis<\u002Fdiv>\n      <h3>A <em>supervisor's<\u002Fem> reading, by the time you've finished your tea.<\u002Fh3>\n      <p class=\"copy\">Transcript lands automatically from Granola, Fathom, or Zoom. Twenty minutes later there's a reflection — process &amp; content dance, transference dynamics, the moment your Self stepped back and a Protector took over.<\u002Fp>\n      <div class=\"ui\">\n        <div class=\"ui-frame\">\n          <div class=\"ui-bar\"><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"ttl\">post-session reflection · 22 min after end<\u002Fspan><\u002Fdiv>\n          <div class=\"ui-body\">\n            <div class=\"ui-row\"><div class=\"ic\" style=\"background:hsl(270 50% 92%);color:hsl(270 50% 38%)\"><i data-lucide=\"brain\"><\u002Fi><\u002Fdiv><div><div class=\"t\">IFS read<\u002Fdiv><div class=\"s\">Manager protecting an Exile that fears rejection. Self present in the second half but <em>blended<\u002Fem> with educator at 0:34.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div class=\"ui-row\"><div class=\"ic\" style=\"background:hsl(150 35% 92%);color:hsl(155 60% 32%)\"><i data-lucide=\"waves\"><\u002Fi><\u002Fdiv><div><div class=\"t\">Process · content dance<\u002Fdiv><div class=\"s\">Content stayed organizational. Process — voice softening at 0:21 — was unmistakably <em>relational<\u002Fem>.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div class=\"ui-row\"><div class=\"ic\" style=\"background:hsl(40 65% 92%);color:hsl(35 70% 32%)\"><i data-lucide=\"sparkles\"><\u002Fi><\u002Fdiv><div><div class=\"t\">Suggested move next time<\u002Fdiv><div class=\"s\">Name what you notice in the body. See what surfaces. <em>Don't apologize for the pivot.<\u002Fem><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRIVACY -->\n<section class=\"sec deep\" id=\"privacy\">\n  <div class=\"inner\">\n    <div class=\"sec-head\">\n      <div class=\"label\" style=\"border-color:var(--coaching-700)\"><span>§ 03 · The trust<\u002Fspan><span class=\"num\">on what your client never gives up<\u002Fspan><\u002Fdiv>\n      <h2>Your client's <em>name<\u002Fem> never leaves Coach Claude.<\u002Fh2>\n    <\u002Fdiv>\n    <p class=\"sec-lede\">Look — our own clients are coaching us through this product. They tell us things they wouldn't say in a board meeting, a marriage, or a journal. <em>We tokenize identities before a single character reaches Anthropic.<\u002Fem> The AI sees the words. <strong>It never sees the name, the email, or the company.<\u002Fstrong> That's not a feature — it's the only way we'd use this on our own clients.<\u002Fp>\n\n    <div style=\"margin-left:276px\">\n      <div class=\"priv-grid\" style=\"grid-template-columns:1fr auto 1fr;max-width:800px\">\n        <div class=\"priv-card\">\n          <div class=\"h\"><i data-lucide=\"eye\"><\u002Fi>What you see<\u002Fdiv>\n          <div class=\"row\"><span class=\"k\">name:<\u002Fspan> <span class=\"v\">Alex Chen<\u002Fspan><\u002Fdiv>\n          <div class=\"row\"><span class=\"k\">email:<\u002Fspan> <span class=\"v\">alex@meridian.io<\u002Fspan><\u002Fdiv>\n          <div class=\"row\"><span class=\"k\">role:<\u002Fspan> <span class=\"v\">VP Eng, Meridian<\u002Fspan><\u002Fdiv>\n          <div class=\"quote\">\"I don't know how to keep showing up at home when work feels like this…\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"priv-arrow\"><div class=\"ar\"><i data-lucide=\"arrow-right\" style=\"width:18px;height:18px\"><\u002Fi><span>tokenize<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"priv-card r\">\n          <div class=\"h\"><i data-lucide=\"shield\"><\u002Fi>What Anthropic sees<\u002Fdiv>\n          <div class=\"row\"><span class=\"k\">name:<\u002Fspan> <span class=\"v\">Client_7f3a<\u002Fspan><\u002Fdiv>\n          <div class=\"row\"><span class=\"k\">email:<\u002Fspan> <span class=\"v\">[redacted]<\u002Fspan><\u002Fdiv>\n          <div class=\"row\"><span class=\"k\">role:<\u002Fspan> <span class=\"v\">Senior_IC_Lead<\u002Fspan><\u002Fdiv>\n          <div class=\"quote\">\"I don't know how to keep showing up at home when work feels like this…\"<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"priv-pills\">\n        <span class=\"pill\"><i data-lucide=\"lock\"><\u002Fi>AES-256 at rest<\u002Fspan>\n        <span class=\"pill\"><i data-lucide=\"check-circle\"><\u002Fi>Zero retention · Claude API<\u002Fspan>\n        <span class=\"pill\"><i data-lucide=\"shield-check\"><\u002Fi>SOC 2 hosting<\u002Fspan>\n        <span class=\"pill\"><i data-lucide=\"x-circle\"><\u002Fi>No training on your sessions<\u002Fspan>\n        <span class=\"pill\"><i data-lucide=\"file-text\"><\u002Fi>Privacy summary for your clients<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SAMPLE -->\n<section class=\"sec\" id=\"sample\">\n  <div class=\"sec-head\">\n    <div class=\"label\"><span>§ 04 · A real reflection<\u002Fspan><span class=\"num\">unedited, anonymized<\u002Fspan><\u002Fdiv>\n    <h2>Read <em>one<\u002Fem>. You'll know.<\u002Fh2>\n  <\u002Fdiv>\n  <p class=\"sec-lede\">Output from a real session, anonymized with permission. <strong>Switch lens<\u002Fstrong> to see how the same product reads differently for a tactical or systemic coach — the analysis style follows your CoachContext, not ours.<\u002Fp>\n  <div style=\"margin-left:276px;margin-top:18px;display:flex;gap:8px;flex-wrap:wrap\" id=\"lens-tabs\">\n    <button class=\"lens-tab on\" data-lens=\"depth\">Depth · relational<\u002Fbutton>\n    <button class=\"lens-tab\" data-lens=\"tactical\">Tactical · performance<\u002Fbutton>\n    <button class=\"lens-tab\" data-lens=\"systemic\">Leadership · systemic<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"reflect\" id=\"reflect-card\">\n    <div class=\"reflect-hd\">\n      <div class=\"av\" id=\"reflect-av\">AC<\u002Fdiv>\n      <div style=\"flex:1\"><div class=\"nm\" id=\"reflect-nm\">Client A · Session 14<\u002Fdiv><div class=\"mt\" id=\"reflect-mt\">52 min · IFS + Process lens<\u002Fdiv><\u002Fdiv>\n      <span class=\"reflect-meta\" style=\"border:1px solid var(--coaching-200);padding:4px 10px;border-radius:999px;background:hsl(184 30% 92%);color:var(--coaching-700);font-size:10px;font-weight:600;text-transform:uppercase\">supervision<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"reflect-bd\" id=\"reflect-bd\"><\u002Fdiv>\n    <div class=\"reflect-meta\" id=\"reflect-meta-row\">\n      <span style=\"margin-left:auto\">22 min after session end · claude-sonnet-4.5<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-left:276px;margin-top:24px;display:flex;justify-content:center;max-width:880px\">\n    <a class=\"btn prim lg\" href=\"#book\" style=\"padding:14px 26px\"><i data-lucide=\"arrow-right\"><\u002Fi>Request a walkthrough<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MY PRACTICE — the depth -->\n<section class=\"sec\" id=\"practice-depth\">\n  <div class=\"sec-head\">\n    <div class=\"label\"><span>§ 05 · Your practice, in one place<\u002Fspan><span class=\"num\">four ways in, one home base<\u002Fspan><\u002Fdiv>\n    <h2>Everything <em>between<\u002Fem> sessions, in one place.<\u002Fh2>\n  <\u002Fdiv>\n  <p class=\"sec-lede\">A reflection after every session is the obvious thing. The less obvious thing is what builds underneath it: your stance, the supervision report you can hand to anyone, the next book you should actually read. <em>This is what we use, every week, to stay sharp.<\u002Fem><\u002Fp>\n\n  <!-- Tab strip preview -->\n  <div style=\"margin-top:48px;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 0 #e8dcc0,8px 10px 0 -4px var(--paper-deep)\">\n    <!-- Browser-ish chrome -->\n    <div style=\"display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--paper-soft);font-family:var(--font-mono);font-size:11px;color:var(--ink-quiet);letter-spacing:.04em\">\n      <span style=\"width:9px;height:9px;border-radius:50%;background:#e0c89a\"><\u002Fspan>\n      <span style=\"width:9px;height:9px;border-radius:50%;background:#d8c096\"><\u002Fspan>\n      <span style=\"width:9px;height:9px;border-radius:50%;background:#cfb78e\"><\u002Fspan>\n      <span style=\"margin-left:14px\">coachclaude.app / my-practice<\u002Fspan>\n    <\u002Fdiv>\n    <!-- Tab row -->\n    <div id=\"depth-tabs\" style=\"display:flex;border-bottom:1px solid var(--line);background:#fff\">\n      <button class=\"depth-tab on\" data-d=\"reflection\"><i data-lucide=\"book-open\"><\u002Fi><span>Reflection<\u002Fspan><\u002Fbutton>\n      <button class=\"depth-tab\" data-d=\"approach\"><i data-lucide=\"compass\"><\u002Fi><span>My Approach<\u002Fspan><\u002Fbutton>\n      <button class=\"depth-tab\" data-d=\"report\"><i data-lucide=\"file-text\"><\u002Fi><span>Supervision Report<\u002Fspan><\u002Fbutton>\n      <button class=\"depth-tab\" data-d=\"learning\"><i data-lucide=\"library\"><\u002Fi><span>Learning &amp; Growth<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n    <!-- Tab body -->\n    <div id=\"depth-body\" style=\"padding:36px 40px;min-height:280px;background:var(--paper-soft)\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Footnote -->\n  <div style=\"margin-left:276px;margin-top:18px;font-family:var(--font-serif);font-size:14.5px;font-style:italic;color:var(--ink-quiet);max-width:760px\">Four tabs. One running document of your practice. <em style=\"color:var(--coaching-700)\">It compounds.<\u002Fem> A coach who's been on it six months is a different coach than one who started Tuesday — and the AI knows the difference.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- PERSONAS -->\n<section class=\"sec deep\" id=\"for\">\n  <div class=\"inner\">\n    <div class=\"sec-head\">\n      <div class=\"label\" style=\"border-color:var(--coaching-700)\"><span>§ 06 · Who it's for<\u002Fspan><span class=\"num\">coaches obsessed with their craft<\u002Fspan><\u002Fdiv>\n      <h2>Coaches who are <em>obsessed<\u002Fem> with getting better.<\u002Fh2>\n    <\u002Fdiv>\n    <p class=\"sec-lede\">Coaches at the top of their craft who still believe they have another level. <em>That's the whole audience.<\u002Fem> Not because we're picky — because that's who we are, and that's who this was made for.<\u002Fp>\n    <div class=\"personas\">\n      <div class=\"persona\">\n        <div class=\"pic\" style=\"background:hsl(35 60% 90%);color:hsl(35 70% 30%)\">M<\u002Fdiv>\n        <div class=\"nm\">The senior solo<\u002Fdiv>\n        <div class=\"role\">12–18 clients · high day-rate<\u002Fdiv>\n        <div class=\"why\">\"I want to come to every session having actually <em>thought<\u002Fem> about my client. Coach Claude does the part I never have time for.\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"persona\">\n        <div class=\"pic\" style=\"background:hsl(184 30% 90%);color:var(--coaching-700)\">S<\u002Fdiv>\n        <div class=\"nm\">The supervisor<\u002Fdiv>\n        <div class=\"role\">Coaches other coaches · sees the field<\u002Fdiv>\n        <div class=\"why\">\"My human supervisor sees me twice a quarter. Coach Claude reads <em>every<\u002Fem> session. The two are not in competition.\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"persona\">\n        <div class=\"pic\" style=\"background:hsl(270 50% 90%);color:hsl(270 50% 38%)\">B<\u002Fdiv>\n        <div class=\"nm\">The builder<\u002Fdiv>\n        <div class=\"role\">Growing a high-end practice<\u002Fdiv>\n        <div class=\"why\">\"It noticed something I'd missed across three sessions. I ran the suggested move. <em>That<\u002Fem> session was the breakthrough.\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HUMAN TOUCH -->\n<section class=\"sec\" id=\"with-supervisor\" style=\"padding-top:0;padding-bottom:60px\">\n  <div style=\"margin-left:276px;max-width:800px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px 32px;display:flex;gap:22px;align-items:flex-start\">\n    <div style=\"width:42px;height:42px;border-radius:10px;background:hsl(35 60% 92%);color:hsl(35 70% 32%);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><i data-lucide=\"users\" style=\"width:18px;height:18px\"><\u002Fi><\u002Fdiv>\n    <div>\n      <div style=\"font-family:var(--font-mono);font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--ink-quiet);text-transform:uppercase;margin-bottom:6px\">A note on supervision<\u002Fdiv>\n      <p style=\"margin:0;font-family:var(--font-serif);font-size:17px;line-height:1.55;color:var(--ink-soft)\">Coach Claude doesn't replace your supervisor. <em style=\"color:var(--coaching-800)\">Coach Claude makes you better prepared for them.<\u002Fem> It fills the gap between supervision sessions — the thinking that happens between conversations with the human who knows you best.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHY — the origin story IS the pitch -->\n<section class=\"sec\" id=\"why\">\n  <div class=\"sec-head\">\n    <div class=\"label\"><span>§ 07 · How this happened<\u002Fspan><span class=\"num\">a coach showed it to a coach<\u002Fspan><\u002Fdiv>\n    <h2>One coach built it. Another said <em>“I need this.”<\u002Fem><\u002Fh2>\n  <\u002Fdiv>\n  <p class=\"sec-lede\">There isn't a company behind this — there are two coaches who've been on both sides of the work. Dan coached Ayman through scaling AppSumo past $80M. Ayman coaches founders himself now. Dan kept tinkering with how to get better. <em>This is what came out of it.<\u002Fem><\u002Fp>\n\n  <div class=\"founders\" style=\"margin-left:276px;max-width:800px\">\n    <div class=\"founder\">\n      <div class=\"av\" style=\"background:hsl(184 30% 90%);color:var(--coaching-700)\">D<\u002Fdiv>\n      <div class=\"nm\">Dan <em>Putt<\u002Fem><\u002Fdiv>\n      <div class=\"cred\">Co-founder, Reboot.io · executive coach · builder<\u002Fdiv>\n      <p class=\"blurb\">\"I built this for myself. Months of tinkering — prompts, workflows, analysis pipelines — because I wanted a second set of eyes on every session. When I showed it to Ayman, a client I'd coached who'd become a coach himself, he said <em style=\"color:var(--ink);font-weight:600;font-style:italic\">‘I'd buy this right now.’<\u002Fem> So we built it for real.\"<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"founder\">\n      <div class=\"av\" style=\"background:hsl(35 60% 90%);color:hsl(35 70% 30%)\">A<\u002Fdiv>\n      <div class=\"nm\">Ayman <em>Al-Abdullah<\u002Fem><\u002Fdiv>\n      <div class=\"cred\">Former CEO, AppSumo ($80M+) · now coaching founders<\u002Fdiv>\n      <p class=\"blurb\">\"Dan was my coach when I was running AppSumo. I know what great coaching feels like from the inside. The first time I ran one of my own sessions through Coach Claude, it named something I'd been doing <em style=\"color:var(--ink);font-weight:600;font-style:italic\">for six months<\u002Fem> without seeing it.\"<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section class=\"sec\" id=\"faq\">\n  <div class=\"sec-head\">\n    <div class=\"label\"><span>§ 08 · Common questions<\u002Fspan><span class=\"num\">asked first by other coaches<\u002Fspan><\u002Fdiv>\n    <h2>The questions other <em>coaches<\u002Fem> ask.<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"faq-list\">\n    <div class=\"faq-item open\">\n      <div class=\"faq-q\"><span>Is this AI <em>coaching<\u002Fem> my clients?<\u002Fspan><span class=\"ic\"><i data-lucide=\"plus\"><\u002Fi><\u002Fspan><\u002Fdiv>\n      <p class=\"faq-a\"><strong>No.<\u002Fstrong> Coach Claude never speaks to your clients and isn't designed to. It's a tool <em>for the coach<\u002Fem> — pre-session prep and post-session reflection. The conversation in the room stays entirely yours. We built it because that's what <em>we<\u002Fem> wanted: a second set of eyes for the coach, not a stand-in for one.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"faq-item\">\n      <div class=\"faq-q\"><span>What about my client's privacy?<\u002Fspan><span class=\"ic\"><i data-lucide=\"plus\"><\u002Fi><\u002Fspan><\u002Fdiv>\n      <p class=\"faq-a\">Names, emails, and roles are tokenized <em>before<\u002Fem> anything reaches Anthropic. Transcripts encrypted at rest. Zero retention with the Claude API. Our own clients are coaching us through this product — we treat their trust the way we'd want ours treated. Happy to send a one-pager to your client's legal team on request.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"faq-item\">\n      <div class=\"faq-q\"><span>Which frameworks does the analysis use?<\u002Fspan><span class=\"ic\"><i data-lucide=\"plus\"><\u002Fi><\u002Fspan><\u002Fdiv>\n      <p class=\"faq-a\">IFS, Polyvagal Theory, Leader on the Couch (Kets de Vries), and process-content dynamics by default. You can configure which lenses to apply per client in My Approach.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"faq-item\">\n      <div class=\"faq-q\"><span>Where do transcripts come from?<\u002Fspan><span class=\"ic\"><i data-lucide=\"plus\"><\u002Fi><\u002Fspan><\u002Fdiv>\n      <p class=\"faq-a\">Granola, Fathom, Zoom cloud recordings, Otter.ai, or paste them yourself. We work from finished transcripts, the way a supervisor would — not live audio.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"faq-item\">\n      <div class=\"faq-q\"><span>How is this different from ChatGPT?<\u002Fspan><span class=\"ic\"><i data-lucide=\"plus\"><\u002Fi><\u002Fspan><\u002Fdiv>\n      <p class=\"faq-a\"><em>One:<\u002Fem> it remembers your practice — every session, every client, every pattern. <em>Two:<\u002Fem> it's grounded in real coaching frameworks, not generic advice. <em>Three:<\u002Fem> client identities are encrypted before they ever reach an AI provider. Paste a transcript into ChatGPT and you've already given up the second and third.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"faq-item\">\n      <div class=\"faq-q\"><span>Do I have to use a particular framework?<\u002Fspan><span class=\"ic\"><i data-lucide=\"plus\"><\u002Fi><\u002Fspan><\u002Fdiv>\n      <p class=\"faq-a\"><em>No.<\u002Fem> The analysis style follows your CoachContext — the lenses, frameworks, and language <em>you<\u002Fem> use. Tactical, depth, systemic, somatic, behavioral, all configurable per client. The product reads the way you read.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"faq-item\">\n      <div class=\"faq-q\"><span>What does it cost?<\u002Fspan><span class=\"ic\"><i data-lucide=\"plus\"><\u002Fi><\u002Fspan><\u002Fdiv>\n      <p class=\"faq-a\">We'd rather talk it through on the call. The short version: a fraction of one client-hour per month, with API usage shown transparently. Founding-cohort coaches get founder pricing for life.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FINAL CTA -->\n<section class=\"final\" id=\"book\">\n  <div style=\"font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--coaching-700);text-transform:uppercase;margin-bottom:18px\">Founding cohort · 30 spots this quarter<\u002Fdiv>\n  <h2>Bring a recent session. Leave with a <em>read<\u002Fem> of your own practice.<\u002Fh2>\n  <p>One of us — Dan or Ayman — will open the app with you, run a transcript of yours through the supervisor live, and you'll know in fifteen minutes whether this is a tool you'll keep using. <em>No deck. No pitch.<\u002Fem> Just two coaches showing another coach what they made.<\u002Fp>\n  <div style=\"display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:8px\">\n    <a class=\"btn prim lg\" href=\"#\"><i data-lucide=\"arrow-right\"><\u002Fi>Request a walkthrough<\u002Fa>\n    <a href=\"#sample\" style=\"font-family:var(--font-serif);font-size:15px;color:var(--ink-mute);text-decoration:underline dotted;font-style:italic\">or see a sample session analysis →<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"micro\">we onboard every coach ourselves · founding-cohort pricing held for life<\u002Fdiv>\n<\u002Fsection>\n\n<footer class=\"ftr\">\n  <div class=\"ftr-in\">\n    <div class=\"ftr-l\">© 2026 Coach Claude · <em>made by two coaches who wanted to get better. holding the door open for whoever else does too.<\u002Fem><\u002Fdiv>\n    <div class=\"ftr-r\">\n      <a href=\"#\">Privacy<\u002Fa><a href=\"#\">Security<\u002Fa><a href=\"#\">Contact<\u002Fa><a href=\"#\">Sign in<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<style>\n  .lens-tab { font-family: var(--font-mono); font-size: 11px; padding: 7px 14px; border-radius: 999px; background: transparent; border: 1px solid var(--line); color: var(--ink-mute); cursor: pointer; letter-spacing: .04em; }\n  .lens-tab.on { background: var(--coaching-700); color: #fff; border-color: var(--coaching-700); }\n  .lens-tab:hover:not(.on) { border-color: var(--coaching-700); color: var(--coaching-700); }\n\n  /* My Practice depth tabs */\n  .depth-tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 9px; padding: 16px 18px; background: transparent; border: 0; border-bottom: 2px solid transparent; font-family: var(--font-sans); font-size: 14px; font-weight: 500; color: var(--ink-mute); cursor: pointer; transition: all .15s; letter-spacing: -0.01em; }\n  .depth-tab + .depth-tab { border-left: 1px solid var(--line); }\n  .depth-tab i { width: 15px; height: 15px; stroke-width: 1.75; opacity: .7; }\n  .depth-tab:hover:not(.on) { color: var(--ink); background: rgba(0,0,0,.015); }\n  .depth-tab.on { color: var(--coaching-700); border-bottom-color: var(--coaching-700); background: #fff; }\n  .depth-tab.on i { opacity: 1; }\n\n  .depth-pane { display: grid; grid-template-columns: 1fr 280px; gap: 40px; align-items: start; }\n  .depth-pane h4 { font-family: var(--font-display); font-size: 26px; font-weight: 500; line-height: 1.2; letter-spacing: -0.02em; margin: 0 0 14px; color: var(--ink); }\n  .depth-pane h4 em { font-style: italic; color: var(--coaching-700); font-weight: 500; }\n  .depth-pane .lede { font-family: var(--font-serif); font-size: 16.5px; line-height: 1.55; color: var(--ink); margin: 0 0 20px; }\n  .depth-pane .lede em { font-style: italic; color: var(--coaching-700); }\n  .depth-pane .feat { display: grid; gap: 10px; margin: 0; padding: 0; list-style: none; font-family: var(--font-sans); font-size: 13.5px; line-height: 1.5; color: var(--ink-mute); }\n  .depth-pane .feat li { display: flex; gap: 10px; padding-left: 0; }\n  .depth-pane .feat li::before { content: ''; flex: 0 0 14px; height: 1px; background: var(--coaching-700); margin-top: 11px; opacity: .5; }\n  .depth-pane .feat li b { color: var(--ink); font-weight: 600; }\n\n  .depth-vis { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-mute); line-height: 1.7; min-height: 200px; }\n  .depth-vis .vis-h { font-family: var(--font-sans); font-size: 10.5px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--coaching-700); margin: 0 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }\n  .depth-vis .vis-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dotted var(--line); color: var(--ink); }\n  .depth-vis .vis-row:last-child { border: 0; }\n  .depth-vis .vis-row .k { color: var(--ink-m
