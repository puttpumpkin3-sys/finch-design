ute); font-weight: 400; }\n  .depth-vis .vis-row .v { color: var(--ink); font-weight: 500; }\n  .depth-vis .vis-tag { display: inline-block; font-family: var(--font-mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; background: hsl(184 25% 92%); color: var(--coaching-700); margin: 2px 4px 2px 0; letter-spacing: .04em; }\n<\u002Fstyle>\n\n<div id=\"tweaks\">\n  <span class=\"lab\">Headline<\u002Fspan>\n  <button class=\"on\" data-h=\"0\">builder's invitation<\u002Fbutton>\n  <button data-h=\"1\">felt need<\u002Fbutton>\n  <button data-h=\"2\">second eyes<\u002Fbutton>\n<\u002Fdiv>\n\n<script>lucide.createIcons();\nconst HEADLINES = [\n  'Every other AI tool is trying to <span style=\"color:var(--ink-mute)\">replace coaches<\u002Fspan>.<br/>We built this to make ourselves <em>irreplaceable<\u002Fem>.',\n  'What happens <em>between<\u002Fem> sessions?<br/>Your patterns keep running. Your blind spots stay hidden.',\n  'Every coach deserves a <em>second set of eyes<\u002Fem>.<br/>Not another tool. A thinking partner.'\n];\ndocument.querySelectorAll('#tweaks button').forEach(b => b.addEventListener('click', () => {\n  document.querySelectorAll('#tweaks button').forEach(x => x.classList.remove('on'));\n  b.classList.add('on');\n  document.getElementById('headline').innerHTML = HEADLINES[+b.dataset.h];\n}));\ndocument.querySelectorAll('.faq-item').forEach(it => it.addEventListener('click', () => it.classList.toggle('open')));\n\n// LENS-SWITCHING for sample reflection\nconst LENSES = {\n  depth: {\n    nm: 'Client A \\u00b7 Session 14',\n    mt: '52 min \\u00b7 IFS + Process lens',\n    av: 'A',\n    body: '<h4>The pattern, named<\u002Fh4>'\n      + '<p class=\"body\">Your client arrived with a concrete agenda \\u2014 the leadership restructure \\u2014 and within ten minutes the conversation had migrated to a colleague. <em>This is the third time this month.<\u002Fem> Each time, the pivot is theirs. Each time, you both treat it as a digression to be apologized for. <em>It isn\\u2019t.<\u002Fem><\u002Fp>'\n      + '<p class=\"pull\">The restructure is the container. The relationship is the work. Stop letting them apologize for getting closer to it.<\u002Fp>'\n      + '<h4>Process-content dance<\u002Fh4>'\n      + '<p class=\"body\">Content stayed organizational. Process \\u2014 voice softening, body settling at 0:21 \\u2014 was unmistakably <strong>relational<\u002Fstrong>. You followed the content. Worth a small experiment next session: name what you notice in the body and see what surfaces.<\u002Fp>'\n      + '<h4>One thing to watch in yourself<\u002Fh4>'\n      + '<p class=\"body\">At 0:34 you moved into framework mode. Often a useful move \\u2014 but they were at the edge of feeling something. <em>The framework may have rescued you from the heat as much as them.<\u002Fem><\u002Fp>',\n    tags: ['IFS', 'Process', 'Countertransference']\n  },\n  tactical: {\n    nm: 'Client B \\u00b7 Session 8',\n    mt: '50 min \\u00b7 GROW + accountability lens',\n    av: 'B',\n    body: '<h4>What got committed to<\u002Fh4>'\n      + '<p class=\"body\">Three weeks ago they committed to having the difficult conversation with their #2. Two weeks ago, the same commitment, repackaged. <em>This week, the same commitment, with new caveats.<\u002Fem> The pattern isn\\u2019t avoidance \\u2014 it\\u2019s that the goal keeps shifting under pressure.<\u002Fp>'\n      + '<p class=\"pull\">You\\u2019re tracking the action items. They\\u2019re editing the goal. Name the edit out loud.<\u002Fp>'\n      + '<h4>What you didn\\u2019t pin down<\u002Fh4>'\n      + '<p class=\"body\">The third commitment of the session (\\u201cmaybe by Friday\\u201d) was never timeboxed. Three of last quarter\\u2019s soft commitments are still in the backlog. <em>If it\\u2019s not on the calendar, it isn\\u2019t a commitment.<\u002Fem><\u002Fp>'\n      + '<h4>Suggested move next session<\u002Fh4>'\n      + '<p class=\"body\">Open with the commitment ledger. Don\\u2019t let them re-frame the original goal until the original is named. Then negotiate the re-frame with eyes open.<\u002Fp>',\n    tags: ['GROW', 'Accountability', 'Goal-tracking']\n  },\n  systemic: {\n    nm: 'Client C \\u00b7 Session 19',\n    mt: '55 min \\u00b7 Leadership systems lens',\n    av: 'C',\n    body: '<h4>The system around the leader<\u002Fh4>'\n      + '<p class=\"body\">The conflict your client described with the COO is the third \\u201cdifficult senior peer\\u201d in eighteen months. Different people, same dynamic: a high-performer the org won\\u2019t fire, a CEO who triangulates through them, your client carrying the weight. <em>The pattern is structural, not interpersonal.<\u002Fem><\u002Fp>'\n      + '<p class=\"pull\">You\\u2019re coaching them on the relationship. The relationship is a symptom of the org chart.<\u002Fp>'\n      + '<h4>What\\u2019s in the room behind the room<\u002Fh4>'\n      + '<p class=\"body\">The Chair was mentioned four times \\u2014 once by name, three times by implication (\\u201cthe board wants\\u201d, \\u201cwe\\u2019ve been told\\u201d, \\u201cit\\u2019s already been decided\\u201d). The system is making decisions through your client without your client. That\\u2019s where the energy actually lives.<\u002Fp>'\n      + '<h4>Suggested move next session<\u002Fh4>'\n      + '<p class=\"body\">Map the actual decision rights. Not the org chart \\u2014 who actually moves what, with whom, around what. <em>The coaching is downstream of the map.<\u002Fem><\u002Fp>',\n    tags: ['Systems', 'Org dynamics', 'Power-mapping']\n  }\n};\n\nconst HERO_CARDS = {\n  depth: { eye: 'a real reflection', ttl: 'The pattern, <em>named<\u002Fem>.', body: 'Your client arrived with a concrete agenda \\u2014 the restructure \\u2014 and within ten minutes the conversation had migrated to a colleague. <em>Third time this month.<\u002Fem> Each time, the pivot is theirs. Each time, you both treat it as a digression.', pull: 'The restructure is the container. The relationship is the work.', meta: ['pacing','recurring pivot','question almost not asked'] },\n  tactical: { eye: 'a real reflection', ttl: 'The goal keeps <em>moving<\u002Fem>.', body: 'Three commitments in three weeks. Same goal, three different framings, each softer than the last. <em>The pattern isn\\u2019t avoidance \\u2014 it\\u2019s that the goal edits itself under pressure.<\u002Fem>', pull: 'You\\u2019re tracking the action items. They\\u2019re editing the goal.', meta: ['drift','soft commitment','timeboxing'] },\n  systemic: { eye: 'a real reflection', ttl: 'The pattern is <em>structural<\u002Fem>.', body: 'Third \\u201cdifficult senior peer\\u201d in eighteen months. Different people, same dynamic. <em>The relationship is a symptom of the org chart, not the cause of the friction.<\u002Fem>', pull: 'You\\u2019re coaching the relationship. The system is making the calls.', meta: ['structural','triangulation','decision rights'] }\n};\n\nfunction renderLens(lens) {\n  const L = LENSES[lens];\n  document.getElementById('reflect-bd').innerHTML = L.body;\n  document.getElementById('reflect-nm').textContent = L.nm;\n  document.getElementById('reflect-mt').textContent = L.mt;\n  document.getElementById('reflect-av').textContent = L.av;\n  const meta = document.getElementById('reflect-meta-row');\n  meta.innerHTML = L.tags.map(t => '<span class=\"pill-mini\">' + t + '<\u002Fspan>').join('') + '<span style=\"margin-left:auto\">22 min after session end \\u00b7 claude-sonnet-4.5<\u002Fspan>';\n}\nrenderLens('depth');\ndocument.querySelectorAll('.lens-tab').forEach(b => b.addEventListener('click', () => {\n  document.querySelectorAll('.lens-tab').forEach(x => x.classList.remove('on'));\n  b.classList.add('on');\n  renderLens(b.dataset.lens);\n}));\n\n// Rotate hero card across the three styles\nconst styles = ['depth','tactical','systemic'];\nlet curStyle = 0;\nfunction renderHeroCard(s) {\n  const H = HERO_CARDS[s];\n  const card = document.querySelector('.hero-card');\n  card.dataset.style = s;\n  card.querySelector('.corner-style').textContent = H.eye;\n  card.querySelector('.ttl').innerHTML = H.ttl;\n  card.querySelector('.body').innerHTML = H.body;\n  card.querySelector('.pull').innerHTML = H.pull;\n  card.querySelector('.meta').innerHTML = H.meta.map(m => '<span>' + m + '<\u002Fspan>').join('');\n}\ndocument.getElementById('rotate-style').addEventListener('click', (e) => {\n  e.preventDefault();\n  curStyle = (curStyle + 1) % styles.length;\n  renderHeroCard(styles[curStyle]);\n  document.getElementById('hero-card-cap').innerHTML = '\\u2191 <em>Same product, three coaches.<\u002Fem> The analysis follows <em>your<\u002Fem> CoachContext. <a href=\"#\" id=\"rotate-style\" style=\"color:var(--coaching-700);text-decoration:underline dotted;cursor:pointer\">Cycle styles \\u2192<\u002Fa>';\n  document.getElementById('rotate-style').addEventListener('click', arguments.callee);\n});\n// My Practice — depth tabs\nconst DEPTH = {\n  reflection: {\n    h: 'A supervision-quality narrative <em>after every session<\u002Fem>.',\n    lede: 'What happened. What you did. What you might not have seen alone. <em>Not a transcript summary — a reflection.<\u002Fem> Written in the voice of a thoughtful supervisor who read the whole thing carefully.',\n    feat: [\n      ['Three lenses', 'depth, tactical, systemic — auto-applied based on your CoachContext'],\n      ['Patterns across sessions', 'noticed in session 7 what showed up in 3 and 5'],\n      ['Questions to sit with', 'not action items — questions for your own reflection']\n    ],\n    vis: { h: 'Today · 2:14pm', rows: [['session', 'Alex C. · #14'],['lens', 'depth · relational'],['flag', 'pacing — coach-led']], tags: ['process', 'counter-T', 'ifs'] }\n  },\n  approach: {\n    h: 'Your <em>stance<\u002Fem>, your frameworks, your intentions.',\n    lede: 'The context that shapes everything Coach Claude sees. Update it like a journal entry, not a settings form. <em>The longer you use it, the more your practice becomes legible<\u002Fem> — to the AI, and to yourself.',\n    feat: [\n      ['CoachContext, in your words', 'no taxonomy to learn — write how you actually think'],\n      ['Frameworks you draw from', 'IFS, GROW, polyvagal, Kets de Vries — or none of those'],\n      ['Living document', 'edits propagate to every future reflection']\n    ],\n    vis: { h: 'My Approach · v.7', rows: [['stance', 'depth-relational'],['edge', 'silence'],['updated', '6 days ago']], tags: ['ifs', 'somatic', 'process'] }\n  },\n  report: {\n    h: 'A formal report <em>whenever you need one<\u002Fem>.',\n    lede: 'For your supervisor, an accreditation body, a peer review, or your own records. Anonymizable, exportable, covers any time period. <em>The kind of document that used to take you a Saturday afternoon<\u002Fem> — generated in 90 seconds, then refined.',\n    feat: [\n      ['Period of your choosing', 'last month, last quarter, since you started with a client'],\n      ['Anonymization built-in', 'client identities masked before the report leaves your hands'],\n      ['PDF, DOCX, markdown', 'hand it to anyone, in any format']\n    ],\n    vis: { h: 'Q3 Supervision · draft', rows: [['period', 'Jul–Sep'],['clients', '11'],['sessions', '47']], tags: ['draft', 'anonymized'] }\n  },\n  learning: {\n    h: 'Reading and frameworks <em>tied to your sessions<\u002Fem>.',\n    lede: 'Not generic CPD recommendations — specific to your development edge. <em>Coach Claude noticed you keep landing in the same place with high-control clients.<\u002Fem> Here are three things to read this month, and the framework you might want to spend more time with.',\n    feat: [\n      ['Tied to observed patterns', 'recommendations track what shows up in your work'],\n      ['Books, papers, frameworks', 'curated to your stance — not to a generic curriculum'],\n      ['CPD-loggable', 'export hours for your accreditation, if you keep one']\n    ],\n    vis: { h: 'For you, this month', rows: [['theme', 'high-control clients'],['next', 'Kets de Vries, ch.4'],['cpd', '6.2 hrs logged']], tags: ['reading', 'framework'] }\n  }\n};\nfunction renderDepth(k) {\n  const D = DEPTH[k];\n  const tagsHtml = D.vis.tags.map(t => '<span class=\"vis-tag\">' + t + '<\u002Fspan>').join('');\n  const rowsHtml = D.vis.rows.map(r => '<div class=\"vis-row\"><span class=\"k\">' + r[0] + '<\u002Fspan><span class=\"v\">' + r[1] + '<\u002Fspan><\u002Fdiv>').join('');\n  document.getElementById('depth-body').innerHTML =\n    '<div class=\"depth-pane\">' +\n      '<div>' +\n        '<h4>' + D.h + '<\u002Fh4>' +\n        '<p class=\"lede\">' + D.lede + '<\u002Fp>' +\n        '<ul class=\"feat\">' + D.feat.map(f => '<li><span><b>' + f[0] + '<\u002Fb> — ' + f[1] + '<\u002Fspan><\u002Fli>').join('') + '<\u002Ful>' +\n      '<\u002Fdiv>' +\n      '<div class=\"depth-vis\">' +\n        '<div class=\"vis-h\">' + D.vis.h + '<\u002Fdiv>' +\n        rowsHtml +\n        '<div style=\"margin-top:10px\">' + tagsHtml + '<\u002Fdiv>' +\n      '<\u002Fdiv>' +\n    '<\u002Fdiv>';\n}\nrenderDepth('reflection');\ndocument.querySelectorAll('.depth-tab').forEach(b => b.addEventListener('click', () => {\n  document.querySelectorAll('.depth-tab').forEach(x => x.classList.remove('on'));\n  b.classList.add('on');\n  renderDepth(b.dataset.d);\n}));\n\nwindow.addEventListener('message', (e) => {\n  const d = e.data || {};\n  if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('on');\n  if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');\n});\nwindow.parent && window.parent.postMessage({type:'__edit_mode_available'}, '*');\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
