  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"bfcbd8ec-9735-4fd8-9ef9-5e751a019577\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c33e3a77-d073-48d1-a90e-50d34fb00155\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* Finch — Colors & Type Tokens (rebrand from Coach Claude, May 2026)\n * Evolves the existing notebook-b system. Coaching-teal stays the primary accent.\n * Adds three Finch warm-neutrals for surfaces and positive-signal moments.\n *\n * Type swap: H1/H2/H3 move from Crimson Text → Newsreader (per brief: \"literary name\n * deserves a literary typeface\"). Newsreader has a wider weight range (200–800),\n * better optical sizes, and pairs more cleanly with Inter at small sizes.\n */\n\n:root {\n  /* ---------- CORE PALETTE (light) ---------- */\n  --bg:            hsl(180 15% 97%);   /* page background — warm-cool off-white */\n  --fg:            hsl(200 25% 8%);    /* near-black slate, cool */\n  --fg-muted:      hsl(200 10% 46%);   /* secondary text */\n  --card:          hsl(0 0% 100%);\n  --card-fg:       hsl(200 25% 8%);\n  --popover:       hsl(0 0% 100%);\n  --border:        hsl(200 20% 90%);\n  --input:         hsl(200 20% 90%);\n  --ring:          hsl(184 82% 26%);\n\n  /* Teal — the single brand accent. Used sparingly for CTAs, links, active nav. */\n  --primary:       hsl(184 82% 26%);   /* #0D6F7A — \"coaching-500\" */\n  --primary-fg:    hsl(180 20% 98%);\n\n  --secondary:     hsl(180 18% 95%);\n  --secondary-fg:  hsl(200 25% 12%);\n  --muted:         hsl(180 12% 95%);\n  --muted-fg:      hsl(200 10% 46%);\n  --accent:        hsl(180 18% 95%);\n  --accent-fg:     hsl(200 25% 12%);\n  --destructive:   hsl(0 84.2% 60.2%);\n\n  /* Premium accents — rare; flag high-value moments */\n  --accent-gold:       hsl(40 65% 50%);\n  --accent-teal-light: hsl(184 60% 92%);\n\n  /* ---------- COACHING TEAL SCALE (brand) ---------- */\n  --coaching-50:  #e6f5f6;\n  --coaching-100: #ccebee;\n  --coaching-200: #99d7dd;\n  --coaching-300: #5cbcc5;\n  --coaching-400: #2a9aa5;\n  --coaching-500: #0d6f7a;   /* primary */\n  --coaching-600: #0b5e68;\n  --coaching-700: #094d55;\n  --coaching-800: #073c43;\n  --coaching-900: #052b30;\n  --coaching-950: #031a1d;   /* marketing hero bg */\n\n  /* ---------- FINCH WARM NEUTRALS (new) ---------- */\n  /* Three warm tones added to bridge \"cool slate\" with \"well-loved notebook\".\n     Use sparingly — these don't replace coaching-teal as the primary accent. */\n  --finch-warm:    #8B7355;  /* sparrow-plumage brown — secondary text accents, dividers in editorial blocks */\n  --finch-sage:    #7A8B6F;  /* muted green — \"trending up\" / positive signals only */\n  --finch-clay:    #C4A882;  /* warm parchment — card surfaces in marketing, hero accents */\n  --finch-cream:   #F5F1E8;  /* page-tint cream — alternative to coaching-50 for full-bleed sections */\n\n  /* ---------- SEMANTIC CONTENT-TYPE COLORS ---------- */\n  /* Each thread-entry type in the coaching feed has its own tint.\n     Pulled from /demo page Card borders/backgrounds. */\n  --entry-session:    var(--coaching-100);     /* bg */\n  --entry-session-fg: var(--coaching-700);\n\n  --entry-analysis-bg: hsl(270 60% 96%);       /* purple-100 — IFS / AI analysis */\n  --entry-analysis-fg: hsl(270 50% 45%);       /* purple-600 */\n\n  --entry-note-bg:     hsl(45 100% 94%);       /* amber-50 — coach note */\n  --entry-note-fg:     hsl(35 80% 40%);        /* amber-600 */\n\n  --entry-claude-bg:   hsl(184 60% 92%);       /* coaching-100 — supervisor reply */\n  --entry-claude-fg:   hsl(184 82% 26%);\n\n  --entry-reflect-bg:  hsl(150 55% 94%);       /* emerald-50 */\n  --entry-reflect-fg:  hsl(155 60% 35%);       /* emerald-600 */\n\n  /* ---------- ELEVATION ---------- */\n  --shadow-card:        0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.03);\n  --shadow-card-hover:  0 2px 8px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.06);\n  --shadow-elevated:    0 4px 16px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.04);\n  --shadow-xs:          0 1px 2px rgba(0,0,0,.04);\n\n  /* ---------- RADII ---------- */\n  --radius-sm: 0.375rem;   /*  6px — badges, tags */\n  --radius:    0.625rem;   /* 10px — buttons, inputs (shadcn default) */\n  --radius-lg: 0.75rem;    /* 12px — cards */\n  --radius-xl: 1rem;       /* 16px — hero cards, modals */\n  --radius-full: 9999px;   /* pills, avatars, FABs */\n\n  /* ---------- SPACING (matches tailwind scale) ---------- */\n  --space-1: 0.25rem;\n  --space-2: 0.5rem;\n  --space-3: 0.75rem;\n  --space-4: 1rem;\n  --space-5: 1.25rem;\n  --space-6: 1.5rem;\n  --space-8: 2rem;\n  --space-10: 2.5rem;\n  --space-12: 3rem;\n  --space-16: 4rem;\n\n  /* ---------- TYPE FAMILIES ---------- */\n  /* The codebase uses Inter for UI/body and Crimson Text (serif) for H1/H2/H3 — \"editorial\" voice */\n  --font-sans:  'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;\n  /* Finch: Newsreader replaces Crimson Text for editorial display type.\n     Fallback chain keeps Crimson Text as bridge during rollout. */\n  --font-serif: 'Newsreader', 'Crimson Text', Georgia, 'Times New Roman', serif;\n  --font-mono:  ui-monospace, 'Geist Mono', SFMono-Regular, Menlo, Consolas, monospace;\n\n  /* ---------- TYPE SCALE (semantic) ---------- */\n  /* H1–H3 use serif, semibold, negative tracking, tight leading — editorial feel.\n     H4+ and body use Inter. */\n\n  /* Display / page titles */\n  --h1-font: var(--font-serif);\n  --h1-size-sm: 2.25rem;  /* 36px */\n  --h1-size: 3rem;        /* 48px lg+ */\n  --h1-weight: 600;\n  --h1-tracking: -0.025em;\n  --h1-leading: 1.1;\n\n  --h2-font: var(--font-serif);\n  --h2-size-sm: 1.5rem;   /* 24px */\n  --h2-size: 1.875rem;    /* 30px lg+ */\n  --h2-weight: 600;\n  --h2-tracking: -0.02em;\n  --h2-leading: 1.2;\n\n  --h3-font: var(--font-serif);\n  --h3-size-sm: 1.25rem;  /* 20px */\n  --h3-size: 1.5rem;      /* 24px lg+ */\n  --h3-weight: 600;\n  --h3-tracking: -0.015em;\n  --h3-leading: 1.25;\n\n  --h4-font: var(--font-sans);\n  --h4-size: 1.125rem;    /* 18px */\n  --h4-weight: 600;\n  --h4-tracking: -0.01em;\n\n  --h5-font: var(--font-sans);\n  --h5-size: 1rem;        /* 16px */\n  --h5-weight: 600;\n\n  /* Body / UI */\n  --p-font: var(--font-sans);\n  --p-size: 0.875rem;     /* 14px — default body */\n  --p-leading: 1.625;     /* ~leading-relaxed */\n  --p-weight: 400;\n\n  --p-lg-size: 1.125rem;  /* 18px — marketing lede */\n  --p-lg-leading: 1.625;\n\n  /* Eyebrows / labels (used across dashboard sections) */\n  --eyebrow-size: 0.75rem;       /* 12px */\n  --eyebrow-weight: 600;\n  --eyebrow-tracking: 0.08em;\n  --eyebrow-transform: uppercase;\n  --eyebrow-color: var(--muted-fg);\n\n  /* UI micro-text */\n  --xs-size: 0.75rem;   /* 12px — meta, captions, timestamps */\n  --tiny-size: 0.625rem;/* 10px — uppercase pill labels in chat bubbles */\n\n  /* Code */\n  --code-font: var(--font-mono);\n  --code-size: 0.8125rem; /* 13px */\n}\n\n/* ---------- DARK MODE ---------- */\n.dark, [data-theme=\"dark\"] {\n  --bg:            hsl(210 15% 8%);\n  --fg:            hsl(200 15% 92%);\n  --fg-muted:      hsl(200 10% 58%);\n  --card:          hsl(210 12% 11%);\n  --card-fg:       hsl(200 15% 92%);\n  --popover:       hsl(210 12% 11%);\n  --border:        hsl(210 10% 18%);\n  --input:         hsl(210 10% 18%);\n  --ring:          hsl(184 65% 45%);\n  --primary:       hsl(184 65% 45%);\n  --primary-fg:    hsl(200 25% 8%);\n  --secondary:     hsl(210 10% 15%);\n  --secondary-fg:  hsl(200 15% 92%);\n  --muted:         hsl(210 10% 15%);\n  --muted-fg:      hsl(200 10% 58%);\n  --accent:        hsl(210 10% 15%);\n  --accent-fg:     hsl(200 15% 92%);\n  --accent-gold:       hsl(40 55% 55%);\n  --accent-teal-light: hsl(184 40% 18%);\n\n  --shadow-card:        0 1px 3px rgba(0,0,0,.2), 0 4px 12px rgba(0,0,0,.15);\n  --shadow-card-hover:  0 2px 8px rgba(0,0,0,.25), 0 8px 24px rgba(0,0,0,.2);\n  --shadow-elevated:    0 4px 16px rgba(0,0,0,.3), 0 12px 40px rgba(0,0,0,.2);\n}\n\n/* ---------- DEFAULT APPLICATION ---------- */\nhtml { font-family: var(--font-sans); color: var(--fg); background: var(--bg); }\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--p-size);\n  line-height: var(--p-leading);\n  color: var(--fg);\n  background: var(--bg);\n  /* The real app layers two soft radial teal tints at 20%,0% and 80%,100% */\n  background-image:\n    radial-gradient(ellipse at 20% 0%,   hsla(184, 82%, 26%, 0.03) 0%, transparent 50%),\n    radial-gradient(ellipse at 80% 100%, hsla(184, 82%, 26%, 0.02) 0%, transparent 50%);\n  background-attachment: fixed;\n  -webkit-font-smoothing: antialiased;\n}\n\nh1, h2, h3 { font-family: var(--font-serif); font-weight: 600; letter-spacing: var(--h2-tracking); }\nh1 { font-size: var(--h1-size-sm); line-height: var(--h1-leading); letter-spacing: var(--h1-tracking); }\nh2 { font-size: var(--h2-size-sm); line-height: var(--h2-leading); letter-spacing: var(--h2-tracking); }\nh3 { font-size: var(--h3-size-sm); line-height: var(--h3-leading); letter-spacing: var(--h3-tracking); }\nh4 { font-family: var(--font-sans); font-size: var(--h4-size); font-weight: var(--h4-weight); letter-spacing: var(--h4-tracking); }\nh5 { font-family: var(--font-sans); font-size: var(--h5-size); font-weight: var(--h5-weight); }\np  { font-family: var(--font-sans); font-size: var(--p-size); line-height: var(--p-leading); }\n\n@media (min-width: 1024px) {\n  h1 { font-size: var(--h1-size); }\n  h2 { font-size: var(--h2-size); }\n  h3 { font-size: var(--h3-size); }\n}\n\n.eyebrow {\n  font-size: var(--eyebrow-size);\n  font-weight: var(--eyebrow-weight);\n  text-transform: var(--eyebrow-transform);\n  letter-spacing: var(--eyebrow-tracking);\n  color: var(--eyebrow-color);\n}\n\ncode, pre { font-family: var(--code-font); font-size: var(--code-size); }\n<\u002Fstyle>\n\n<style>\n  :root { --page: #F5F1E8; --paper: #FFFFFF; }\n  html, body { background: var(--page); }\n  body {\n    background-image:\n      radial-gradient(ellipse at 15% 0%,   hsla(184, 82%, 26%, 0.04) 0%, transparent 55%),\n      radial-gradient(ellipse at 85% 100%, hsla(36, 35%, 60%, 0.10) 0%, transparent 55%);\n    background-attachment: fixed;\n    margin: 0;\n    color: var(--fg);\n  }\n  main { max-width: 1180px; margin: 0 auto; padding: 64px 48px 120px; }\n\n  /* ---------- HEADER ---------- */\n  .doc-head { display: flex; align-items: flex-end; justify-content: space-between; padding-bottom: 32px; border-bottom: 1px solid var(--border); margin-bottom: 56px; }\n  .doc-head .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.12em; }\n  .doc-head h1 { margin: 0 0 4px; font-family: var(--font-serif); font-weight: 500; font-size: 56px; letter-spacing: -0.025em; color: var(--coaching-900); }\n  .doc-head .sub { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: 22px; color: var(--finch-warm); }\n\n  /* ---------- SECTION ---------- */\n  section { margin-bottom: 88px; }\n  .eyebrow { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--coaching-700); margin-bottom: 12px; }\n  h2.s-title { font-family: var(--font-serif); font-weight: 500; font-size: 36px; letter-spacing: -0.022em; margin: 0 0 14px; color: var(--coaching-900); }\n  .s-lede { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: 19px; line-height: 1.5; color: var(--fg-muted); max-width: 720px; margin: 0 0 36px; }\n\n  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }\n  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }\n  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }\n\n  .card { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-card); padding: 28px; }\n  .card .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }\n  .card .title { font-family: var(--font-serif); font-weight: 500; font-size: 22px; letter-spacing: -0.012em; margin: 0 0 6px; }\n  .card p { font-family: var(--font-sans); font-size: 14px; line-height: 1.65; color: var(--fg-muted); margin: 0; }\n\n  /* ---------- LOGO HERO ---------- */\n  .logo-hero {\n    background: linear-gradient(180deg, #FAF7F0 0%, #F0EBDF 100%);\n    border: 1px solid var(--border);\n    border-radius: 16px;\n    padding: 80px 64px;\n    display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center;\n    box-shadow: var(--shadow-elevated);\n  }\n  .logo-hero .lockup { display: flex; flex-direction: column; gap: 32px; align-items: flex-start; }\n  .logo-hero .wordmark-display { font-family: 'Newsreader', serif; font-weight: 500; font-size: 120px; letter-spacing: -0.03em; color: var(--coaching-900); line-height: 1; display: flex; align-items: baseline; gap: 24px; }\n  .logo-hero .wordmark-display .mark { width: 96px; height: 96px; }\n  .logo-hero .description p { font-family: var(--font-serif); font-size: 20px; line-height: 1.55; color: var(--fg); margin: 0 0 16px; }\n  .logo-hero .description p.italic { font-style: italic; color: var(--finch-warm); font-size: 17px; }\n\n  /* ---------- LOGO SIZE GRID ---------- */\n  .size-row { display: flex; align-items: flex-end; gap: 32px; padding: 32px; background: var(--paper); border: 1px solid var(--border); border-radius: 12px; }\n  .size-cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }\n  .size-cell .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }\n  .size-cell .frame { display: flex; align-items: center; justify-content: center; }\n\n  /* ---------- COLORS ---------- */\n  .swatch { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }\n  .swatch .chip { height: 96px; }\n  .swatch .meta { padding: 14px 16px; }\n  .swatch .name { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--fg); }\n  .swatch .role { font-family: var(--font-sans); font-size: 12px; color: var(--fg-muted); margin-top: 2px; }\n  .swatch .hex { font-family: var(--font-mono); font-size: 11px; color: var(--coaching-700); margin-top: 8px; letter-spacing: 0.04em; }\n\n  /* ---------- TYPE ---------- */\n  .type-stack { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 40px; display: flex; flex-direction: column; gap: 28px; }\n  .type-row { display: grid; grid-template-columns: 100px 1fr; align-items: baseline; gap: 24px; padding-bottom: 24px; border-bottom: 1px dashed var(--border); }\n  .type-row:last-child { border-bottom: none; padding-bottom: 0; }\n  .type-row .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); line-height: 1.5; }\n  .type-row .sample { color: var(--coaching-900); }\n  .ts-h1 { font-family: var(--font-serif); font-weight: 500; font-size: 56px; letter-spacing: -0.025em; line-height: 1.05; }\n  .ts-h2 { font-family: var(--font-serif); font-weight: 500; font-size: 36px; letter-spacing: -0.022em; line-height: 1.15; }\n  .ts-h3 { font-family: var(--font-serif); font-weight: 500; font-size: 24px; letter-spacing: -0.015em; line-height: 1.25; }\n  .ts-italic { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: 22px; color: var(--finch-warm); }\n  .ts-body { font-family: var(--font-sans); font-size: 15px; line-height: 1.65; color: var(--fg); }\n  .ts-eyebrow { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--coaching-700); }\n  .ts-mono { font-family: var(--font-mono); font-size: 13px; color: var(--coaching-800); }\n\n  /* ---------- VOICE TABLE ---------- */\n  .voice { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }\n  .voice-row { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border); }\n  .voice-row:first-child { border-top: none; }\n  .voice-cell { padding: 24px 28px; }\n  .voice-cell.before { background: hsl(0 30% 98%); border-right: 1px solid var(--border); }\n  .voice-cell.after { background: hsl(184 30% 98%); }\n  .voice-cell .tag { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }\n  .voice-cell.before .tag { color: hsl(0 50% 50%); }\n  .voice-cell.after .tag { color: var(--coaching-700); }\n  .voice-cell .quote { font-family: var(--font-serif); font-style: italic; font-size: 17px; line-height: 1.55; color: var(--fg); margin: 0; }\n\n  /* ---------- BEFORE/AFTER MOCKS ---------- */\n  .ba-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\n  .mock { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-card); }\n  .mock-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: hsl(200 15% 97%); border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-muted); }\n  .mock-head .label { font-weight: 600; }\n  .mock-head .label.before { color: hsl(0 50% 50%); }\n  .mock-head .label.after { color: var(--coaching-700); }\n\n  /* sidebar mock */\n  .sb { background: hsl(180 12% 97%); padding: 20px 16px; min-height: 320px; border-right: 1px solid var(--border); }\n  .sb .brand-old { font-family: var(--font-sans); font-weight: 700; font-size: 18px; color: var(--coaching-600); }\n  .sb .brand-new { display: flex; align-items: center; gap: 10px; }\n  .sb .brand-new .word { font-family: 'Newsreader', serif; font-weight: 500; font-size: 24px; color: var(--coaching-900); letter-spacing: -0.015em; }\n  .sb .brand-new svg { width: 32px; height: 32px; }\n  .sb .nav { margin-top: 28px; display: flex; flex-direction: column; gap: 4px; }\n  .sb .nav-item { font-family: var(--font-sans); font-size: 13px; color: var(--fg-muted); padding: 8px 10px; border-radius: 8px; }\n  .sb .nav-item.active { background: var(--coaching-100); color: var(--coaching-700); font-weight: 600; }\n\n  /* hero mock */\n  .hero-mock { background: var(--coaching-950); padding: 56px 40px; min-height: 320px; color: hsl(180 20% 96%); }\n  .hero-mock .eyebrow-h { color: var(--coaching-300); font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; }\n  .hero-mock h1 { font-family: var(--font-serif); font-weight: 500; font-size: 44px; line-height: 1.1; letter-spacing: -0.022em; margin: 16px 0 16px; max-width: 90%; }\n  .hero-mock h1 .accent { color: var(--coaching-300); font-style: italic; font-weight: 400; }\n  .hero-mock p { font-family: var(--font-sans); font-size: 14px; line-height: 1.6; color: hsl(180 15% 80%); max-width: 80%; margin: 0 0 24px; }\n  .hero-mock .cta { display: inline-block; background: hsl(184 65% 45%); color: var(--coaching-950); font-family: var(--font-sans); font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 8px; white-space: nowrap; }\n  .hero-mock-old h1 { font-family: var(--font-sans); font-weight: 700; font-size: 36px; letter-spacing: -0.02em; }\n\n  /* favicon mock */\n  .browser { background: hsl(0 0% 99%); border-bottom: 1px solid var(--border); }\n  .browser-bar { display: flex; gap: 8px; padding: 10px 14px; background: hsl(200 15% 95%); border-bottom: 1px solid var(--border); }\n  .browser-tabs { display: flex; padding: 8px 14px 0; gap: 6px; }\n  .tab { background: var(--paper); border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; padding: 8px 14px; display: flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-size: 12px; color: var(--fg); }\n  .tab img, .tab .fav-old { width: 14px; height: 14px; border-radius: 3px; }\n  .fav-old { background: var(--coaching-600); color: white; font-family: var(--font-sans); font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }\n\n  /* ---------- LIST / TABLE ---------- */\n  .replace-table { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }\n  .replace-table .row { display: grid; grid-template-columns: 240px 1fr 1fr; padding: 14px 20px; border-top: 1px solid var(--border); font-size: 13px; align-items: center; gap: 16px; }\n  .replace-table .row:first-child { border-top: none; background: hsl(180 15% 97%); font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-muted); padding: 12px 20px; }\n  .replace-table .file { font-family: var(--font-mono); font-size: 12px; color: var(--coaching-800); }\n  .replace-table .from { font-family: var(--font-sans); color: var(--fg-muted); text-decoration: line-through; }\n  .replace-table .to { font-family: var(--font-sans); color: var(--coaching-900); font-weight: 500; }\n\n  .checklist { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 32px 36px; }\n  .checklist h3 { font-family: var(--font-serif); font-weight: 500; font-size: 22px; margin: 0 0 16px; color: var(--coaching-900); }\n  .checklist ul { list-style: none; padding: 0; margin: 0; }\n  .checklist li { font-family: var(--font-sans); font-size: 14px; line-height: 1.6; color: var(--fg); padding: 8px 0 8px 28px; position: relative; border-top: 1px dashed var(--border); }\n  .checklist li:first-child { border-top: none; }\n  .checklist li::before { content: \"\"; position: absolute; left: 0; top: 14px; width: 16px; height: 16px; border: 1.5px solid var(--coaching-500); border-radius: 4px; }\n  .checklist li code { font-family: var(--font-mono); font-size: 12px; background: hsl(184 60% 96%); color: var(--coaching-800); padding: 1px 6px; border-radius: 3px; }\n  .checklist .priority { display: inline-block; font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.12em; padding: 2px 6px; border-radius: 3px; margin-right: 8px; vertical-align: 2px; }\n  .checklist .p0 { background: hsl(0 70% 50%); color: white; }\n  .checklist .p1 { background: var(--finch-warm); color: white; }\n\n  /* ---------- AVOID/USE ---------- */\n  .duo { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n  .duo .panel { padding: 24px 28px; border-radius: 12px; border: 1px solid var(--border); }\n  .duo .use { background: hsl(184 40% 97%); border-color: var(--coaching-200); }\n  .duo .avoid { background: hsl(0 30% 98%); border-color: hsl(0 30% 88%); }\n  .duo .panel h4 { font-family: var(--font-serif); font-weight: 500; font-size: 18px; margin: 0 0 12px; }\n  .duo .use h4 { color: var(--coaching-700); }\n  .duo .avoid h4 { color: hsl(0 50% 45%); }\n  .duo ul { padding-left: 18px; margin: 0; }\n  .duo li { font-family: var(--font-sans); font-size: 13px; line-height: 1.7; color: var(--fg); }\n\n  hr.rule { border: none; border-top: 1px solid var(--border); margin: 88px 0; }\n\n  .footer-note { font-family: var(--font-serif); font-style: italic; font-size: 16px; color: var(--fg-muted); text-align: center; margin-top: 64px; padding-top: 32px; border-top: 1px solid var(--border); }\n\n  /* ---------- TAGLINE ---------- */\n  .taglines { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 40px; }\n  .tagline-item { padding: 20px 0; border-top: 1px dashed var(--border); display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: center; }\n  .tagline-item:first-child { border-top: none; padding-top: 0; }\n  .tagline-item .line { font-family: var(--font-serif); font-weight: 400; font-style: italic; font-size: 26px; letter-spacing: -0.012em; color: var(--coaching-900); line-height: 1.2; }\n  .tagline-item .reason { font-family: var(--font-sans); font-size: 13px; line-height: 1.55; color: var(--fg-muted); }\n  .tagline-item.recommended { background: linear-gradient(90deg, hsl(184 50% 96%) 0%, transparent 100%); margin: 0 -24px; padding: 20px 24px; border-radius: 8px; border-top: none; }\n  .tagline-item.recommended .badge { display: inline-block; font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: white; background: var(--coaching-600); padding: 3px 8px; border-radius: 3px; margin-bottom: 8px; text-transform: uppercase; }\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<main>\n\n  <!-- ===================== HEADER ===================== -->\n  <header class=\"doc-head\">\n    <div>\n      <div class=\"meta\">Brand handoff · Coach Claude → Finch · finch.coach<\u002Fdiv>\n      <h1>Finch.<\u002Fh1>\n      <div class=\"sub\">A wise observer with a moral compass.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align: right;\">\n      <div class=\"meta\">May 6, 2026 · v1.0<\u002Fdiv>\n      <div style=\"font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-top: 6px;\">For: Claude Code · Ayman, Dan<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===================== POSITIONING ===================== -->\n  <section>\n    <div class=\"eyebrow\">01 · Positioning<\u002Fdiv>\n    <h2 class=\"s-title\">The name does the work.<\u002Fh2>\n    <p class=\"s-lede\">Finch carries two threads: Atticus — quiet authority, moral compass — and the bird's-eye view, the supervisor watching the whole practice from above. The product in a sentence: <em>Finch sees what the coach can't, and tells them the truth about it.<\u002Fem><\u002Fp>\n\n    <div class=\"grid-3\">\n      <div class=\"card\">\n        <div class=\"label\">Literary<\u002Fdiv>\n        <h3 class=\"title\">Atticus<\u002Fh3>\n        <p>The moral compass of <em>To Kill a Mockingbird<\u002Fem>. Quiet authority. Sees clearly, speaks directly, holds people to a higher standard. Doesn't grandstand — observes, understands, then acts with conviction. That's exactly what a coaching supervisor does.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"label\">Functional<\u002Fdiv>\n        <h3 class=\"title\">Bird's-eye view<\u002Fh3>\n        <p>The product's core value is pattern recognition across the coach's entire practice. Finch sits above the work, watching threads, spotting trends, surfacing what matters. The bird metaphor is built in without being on the nose.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"label\">Personality<\u002Fdiv>\n        <h3 class=\"title\">Supervisor, not assistant<\u002Fh3>\n        <p>Direct, warm, observant, grounded, confident. The experienced colleague who's seen it all, asks the hard questions, and genuinely wants you to get better. Not a chatbot. Not a peer. Finch has earned its perspective.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr class=\"rule\">\n\n  <!-- ===================== LOGO ===================== -->\n  <section>\n    <div class=\"eyebrow\">02 · Logo system<\u002Fdiv>\n    <h2 class=\"s-title\">The mark.<\u002Fh2>\n    <p class=\"s-lede\">A perched finch — observant, not flying. Audubon sketch, not emoji bird. Geometric, reductive, calm. Reads at 16px favicon and scales to a hero element without losing character.<\u002Fp>\n\n    <div class=\"logo-hero\">\n      <div class=\"lockup\">\n        <div class=\"wordmark-display\">\n          <svg class=\"mark\" viewBox=\"0 0 64 64\" aria-label=\"Finch mark\">\n            <ellipse cx=\"32\" cy=\"32\" rx=\"14\" ry=\"11\" fill=\"#0D6F7A\"><\u002Fellipse>\n            <circle cx=\"42\" cy=\"24\" r=\"7.5\" fill=\"#0D6F7A\"><\u002Fcircle>\n            <path d=\"M48 24 L 56 22 L 56 27 L 48 27 Z\" fill=\"#0D6F7A\"><\u002Fpath>\n            <path d=\"M18 30 L 10 26 L 12 36 Z\" fill=\"#0D6F7A\"><\u002Fpath>\n            <path d=\"M28 30 Q 32 26 38 30 Q 34 38 28 36 Z\" fill=\"#094D55\" opacity=\"0.4\"><\u002Fpath>\n            <line x1=\"30\" y1=\"42\" x2=\"29\" y2=\"50\" stroke=\"#0D6F7A\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"36\" y1=\"42\" x2=\"37\" y2=\"50\" stroke=\"#0D6F7A\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"16\" y1=\"51\" x2=\"50\" y2=\"51\" stroke=\"#0D6F7A\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline>\n            <circle cx=\"44\" cy=\"22.5\" r=\"1.4\" fill=\"#F5F1E8\"><\u002Fcircle>\n          <\u002Fsvg>\n          Finch\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"description\">\n        <p>The mark is a perched finch in coaching teal. Plump body, round head, stubby seed-eater beak, short tail, small light eye. Two thin legs on a horizontal branch.<\u002Fp>\n        <p class=\"italic\">It's watching, not performing.<\u002Fp>\n        <p style=\"font-family: var(--font-sans); font-size: 13px; color: var(--fg-muted); line-height: 1.7; margin-top: 16px;\">Geometric construction on a 64×64 grid. Three filled shapes (body, head, beak) plus tail wedge and two stroked legs. The branch reads as a horizontal anchor — gravity, presence, \"perched and observant.\"<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 32px;\">\n      <div class=\"eyebrow\">Sizes · the mark works at every scale<\u002Fdiv>\n      <div class=\"size-row\" style=\"margin-top: 8px;\">\n        <div class=\"size-cell\">\n          <div class=\"frame\"><img src=\"dd2b9e30-1848-4cb0-9f66-b13572278311\" width=\"16\" height=\"16\"><\u002Fdiv>\n          <div class=\"px\">16 · favicon<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"size-cell\">\n          <div class=\"frame\"><img src=\"dd2b9e30-1848-4cb0-9f66-b13572278311\" width=\"24\" height=\"24\"><\u002Fdiv>\n          <div class=\"px\">24 · sidebar<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"size-cell\">\n          <div class=\"frame\"><img src=\"dd2b9e30-1848-4cb0-9f66-b13572278311\" width=\"32\" height=\"32\"><\u002Fdiv>\n          <div class=\"px\">32 · tab<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"size-cell\">\n          <div class=\"frame\"><img src=\"7d80e945-64e3-47bf-a000-72992d3b0cbb\" width=\"48\" height=\"48\"><\u002Fdiv>\n          <div class=\"px\">48 · nav<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"size-cell\">\n          <div class=\"frame\"><img src=\"7d80e945-64e3-47bf-a000-72992d3b0cbb\" width=\"80\" height=\"80\"><\u002Fdiv>\n          <div class=\"px\">80 · profile<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"size-cell\">\n          <div class=\"frame\"><img src=\"7d80e945-64e3-47bf-a000-72992d3b0cbb\" width=\"160\" height=\"160\"><\u002Fdiv>\n          <div class=\"px\">160 · hero<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Favicon in browser -->\n    <div style=\"margin-top: 32px;\">\n      <div class=\"eyebrow\">In context · browser tab + sidebar<\u002Fdiv>\n      <div class=\"ba-grid\" style=\"margin-top: 8px;\">\n        <div class=\"mock\">\n          <div class=\"mock-head\"><span>browser tab<\u002Fspan><span class=\"label before\">Before<\u002Fspan><\u002Fdiv>\n          <div class=\"browser\">\n            <div class=\"browser-bar\"><span style=\"width:10px;height:10px;border-radius:50%;background:#ff5f57;\"><\u002Fspan><span style=\"width:10px;height:10px;border-radius:50%;background:#febc2e;\"><\u002Fspan><span style=\"width:10px;height:10px;border-radius:50%;background:#28c840;\"><\u002Fspan><\u002Fdiv>\n            <div class=\"browser-tabs\"><div class=\"tab\"><span class=\"fav-old\">CC<\u002Fspan>Coach Claude<\u002Fdiv><\u002Fdiv>\n            <div style=\"height: 60px; background: white;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mock\">\n          <div class=\"mock-head\"><span>browser tab<\u002Fspan><span class=\"label after\">After<\u002Fspan><\u002Fdiv>\n          <div class=\"browser\">\n            <div class=\"browser-bar\"><span style=\"width:10px;height:10px;border-radius:50%;background:#ff5f57;\"><\u002Fspan><span style=\"width:10px;height:10px;border-radius:50%;background:#febc2e;\"><\u002Fspan><span style=\"width:10px;height:10px;border-radius:50%;background:#28c840;\"><\u002Fspan><\u002Fdiv>\n            <div class=\"browser-tabs\"><div class=\"tab\"><img src=\"dd2b9e30-1848-4cb0-9f66-b13572278311\">Finch<\u002Fdiv><\u002Fdiv>\n            <div style=\"height: 60px; background: white;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"mock\">\n          <div class=\"mock-head\"><span>app sidebar<\u002Fspan><span class=\"label before\">Before<\u002Fspan><\u002Fdiv>\n          <div class=\"sb\">\n            <div class=\"brand-old\">Coach Claude<\u002Fdiv>\n            <div class=\"nav\">\n              <div class=\"nav-item active\">Clients<\u002Fdiv>\n              <div class=\"nav-item\">My Practice<\u002Fdiv>\n              <div class=\"nav-item\">Calendar<\u002Fdiv>\n              <div class=\"nav-item\">Follow-Ups<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mock\">\n          <div class=\"mock-head\"><span>app sidebar<\u002Fspan><span class=\"label after\">After<\u002Fspan><\u002Fdiv>\n          <div class=\"sb\">\n            <div class=\"brand-new\">\n              <img src=\"dd2b9e30-1848-4cb0-9f66-b13572278311\" width=\"32\" height=\"32\">\n              <span class=\"word\">Finch<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"nav\">\n              <div class=\"nav-item active\">Clients<\u002Fdiv>\n              <div class=\"nav-item\">My Practice<\u002Fdiv>\n              <div class=\"nav-item\">Calendar<\u002Fdiv>\n              <div class=\"nav-item\">Follow-Ups<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"duo\" style=\"margin-top: 32px;\">\n      <div class=\"panel use\">\n        <h4>Use<\u002Fh4>\n        <ul>\n          <li>Mark + wordmark lockup for primary brand placements (sidebar header, landing nav, footer)<\u002Fli>\n          <li>Mark alone for favicon, app icon, social avatar, loading states<\u002Fli>\n          <li>Wordmark alone for body copy mentions, document headers<\u002Fli>\n          <li>Coaching teal (#0D6F7A) for the mark on light surfaces; cream (#F5F1E8) on dark hero<\u002Fli>\n          <li>Minimum clear space = the height of the \"F\" stem on all sides<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"panel avoid\">\n        <h4>Avoid<\u002Fh4>\n        <ul>\n          <li>Don't rotate, skew, or animate the bird (it's perched, not flying)<\u002Fli>\n          <li>Don't add gradients, drop shadows, or strokes to the mark<\u002Fli>\n          <li>Don't use the mark in non-brand colors (no red, blue, purple)<\u002Fli>\n          <li>Don't pair with a tagline lockup — the word stands alone<\u002Fli>\n          <li>Don't illustrate the bird elsewhere in the UI; the name does the work<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr class=\"rule\">\n\n  <!-- ===================== COLOR ===================== -->\n  <section>\n    <div class=\"eyebrow\">03 · Color<\u002Fdiv>\n    <h2 class=\"s-title\">Keep the teal. Add three warm neutrals.<\u002Fh2>\n    <p class=\"s-lede\">Coaching teal stays the single brand accent — it's distinctive, calm, and earned. Three Finch warm-neutrals (sparrow, sage, clay) join the system to bridge cool slate with \"well-loved notebook.\" Use them sparingly. They don't compete with teal; they support it.<\u002Fp>\n\n    <div class=\"eyebrow\" style=\"margin-top: 8px;\">Primary · coaching teal scale (unchanged)<\u002Fdiv>\n    <div class=\"grid-4\" style=\"margin-top: 12px;\">\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#e6f5f6\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">coaching-50<\u002Fdiv><div class=\"role\">Soft wash, hover, panels<\u002Fdiv><div class=\"hex\">#E6F5F6<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#99d7dd\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">coaching-200<\u002Fdiv><div class=\"role\">Borders, semantic tints<\u002Fdiv><div class=\"hex\">#99D7DD<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#0d6f7a\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">coaching-500 · primary<\u002Fdiv><div class=\"role\">CTAs, links, active nav, mark<\u002Fdiv><div class=\"hex\">#0D6F7A<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#031a1d\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">coaching-950<\u002Fdiv><div class=\"role\">Marketing hero bg<\u002Fdiv><div class=\"hex\">#031A1D<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"eyebrow\" style=\"margin-top: 32px;\">New · Finch warm neutrals<\u002Fdiv>\n    <div class=\"grid-4\" style=\"margin-top: 12px;\">\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#F5F1E8\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">finch-cream<\u002Fdiv><div class=\"role\">Page tint for landing, eye dot in mark<\u002Fdiv><div class=\"hex\">#F5F1E8<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#C4A882\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">finch-clay<\u002Fdiv><div class=\"role\">Warm parchment surface, hero accents<\u002Fdiv><div class=\"hex\">#C4A882<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#8B7355\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">finch-warm<\u002Fdiv><div class=\"role\">Editorial italics, dividers, secondary text<\u002Fdiv><div class=\"hex\">#8B7355<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#7A8B6F\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">finch-sage<\u002Fdiv><div class=\"role\">Positive signal only (client trending up)<\u002Fdiv><div class=\"hex\">#7A8B6F<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"eyebrow\" style=\"margin-top: 32px;\">Semantic content tints (unchanged) · thread entries only<\u002Fdiv>\n    <div class=\"grid-4\" style=\"margin-top: 12px;\">\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#ccebee\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Session<\u002Fdiv><div class=\"role\">Coaching teal · transcripts<\u002Fdiv><div class=\"hex\">coaching-100<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:hsl(270 60% 92%)\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Analysis<\u002Fdiv><div class=\"role\">Purple · IFS / supervision<\u002Fdiv><div class=\"hex\">purple-100<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:hsl(45 100% 90%)\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Coach Note<\u002Fdiv><div class=\"role\">Amber · handwritten feel<\u002Fdiv><div class=\"hex\">amber-50<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:hsl(150 55% 92%)\"><\u002Fdiv><div class=\"meta\"><div class=\"name\">Reflection<\u002Fdiv><div class=\"role\">Emerald · prompts<\u002Fdiv><div class=\"hex\">emerald-50<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr class=\"rule\">\n\n  <!-- ===================== TYPE ===================== -->\n  <section>\n    <div class=\"eyebrow\">04 · Type<\u002Fdiv>\n    <h2 class=\"s-title\">Newsreader replaces Crimson Text. Inter stays.<\u002Fh2>\n    <p class=\"s-lede\">A literary name deserves a literary typeface. <strong>Newsreader<\u002Fstrong> brings a wider weight range, optical sizes, and a slightly warmer texture than Crimson Text — closer to a worn paperback than a stock serif. Inter stays for body and UI. JetBrains Mono stays for data readouts and timestamps.<\u002Fp>\n\n    <div class=\"type-stack\">\n      <div class=\"type-row\">\n        <div class=\"meta\">H1<br>Newsreader 500<br>56/1.05<br>−0.025em<\u002Fdiv>\n        <div class=\"sample ts-h1\">See your practice<br>clearly.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"meta\">H2<br>Newsreader 500<br>36/1.15<br>−0.022em<\u002Fdiv>\n        <div class=\"sample ts-h2\">Sarah deflected three sessions running. That's avoidance.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"meta\">H3<br>Newsreader 500<br>24/1.25<br>−0.015em<\u002Fdiv>\n        <div class=\"sample ts-h3\">Pre-session prep · Alex Chen, 10:00 AM<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"meta\">Editorial<br>Newsreader 400 italic<br>22/1.5<\u002Fdiv>\n        <div class=\"sample ts-italic\">Through an IFS lens, the manager has stepped forward again.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"meta\">Body<br>Inter 400<br>15/1.65<\u002Fdiv>\n        <div class=\"sample ts-body\">Finch tracks longitudinal patterns across your practice — connecting session 3 to session 17 — so you walk into every conversation with the context you've earned but can't always hold in working memory.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"meta\">Eyebrow<br>Inter 600<br>11/1<br>+0.14em<\u002Fdiv>\n        <div class=\"sample ts-eyebrow\">Needs attention · 02<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"type-row\">\n        <div class=\"meta\">Mono<br>JetBrains 400<br>13/1.5<\u002Fdiv>\n        <div class=\"sample ts-mono\">10:00 AM · session #14 · briefing ready<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr class=\"rule\">\n\n  <!-- ===================== VOICE ===================== -->\n  <section>\n    <div class=\"eyebrow\">05 · Voice<\u002Fdiv>\n    <h2 class=\"s-title\">Direct, warm, never sycophantic.<\u002Fh2>\n    <p class=\"s-lede\">Finch is the experienced colleague in your peer consultation group. Names patterns, asks provocative questions, points out what you missed. No \"Great question!\" No hedging. Honest and invested.<\u002Fp>\n\n    <div class=\"voice\">\n      <div class=\"voice-row\">\n        <div class=\"voice-cell before\">\n          <div class=\"tag\">Before · Coach Claude<\u002Fdiv>\n          <p class=\"quote\">\"Based on your session notes, it seems like there might be some avoidance patterns worth exploring with this client.\"<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"voice-cell after\">\n          <div class=\"tag\">After · Finch<\u002Fdiv>\n          <p class=\"quote\">\"Sarah has deflected from the leadership transition topic three sessions running. That's not coincidence — it's avoidance. Your pre-session prep should name it directly.\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"voice-row\">\n        <div class=\"voice-cell before\">\n          <div class=\"tag\">Before<\u002Fdiv>\n          <p class=\"quote\">\"AI-Powered Coaching Analysis Platform\"<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"voice-cell after\">\n          <div class=\"tag\">After<\u002Fdiv>\n          <p class=\"quote\">\"See your practice clearly.\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"voice-row\">\n        <div class=\"voice-cell before\">\n          <div class=\"tag\">Before<\u002Fdiv>\n          <p class=\"quote\">\"Upload your transcripts to get started\"<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"voice-cell after\">\n          <div class=\"tag\">After<\u002Fdiv>\n          <p class=\"quote\">\"Bring two sessions. See what you've been missing.\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"voice-row\">\n        <div class=\"voice-cell before\">\n          <div class=\"tag\">Before<\u002Fdiv>\n          <p class=\"quote\">\"Sign up for a free trial\"<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"voice-cell after\">\n          <div class=\"tag\">After<\u002Fdiv>\n          <p class=\"quote\">\"Try Finch free.\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"voice-row\">\n        <div class=\"voice-cell before\">\n          <div class=\"tag\">Before · greeting<\u002Fdiv>\n          <p class=\"quote\">\"Good morning! Hope you have a great day. You have 2 sessions today 🎉\"<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"voice-cell after\">\n          <div class=\"tag\">After · greeting<\u002Fdiv>\n          <p class=\"quote\">\"Good morning, Dan. Two sessions today. Alex Chen, 10 AM — briefing ready. Priya Shah, 2:30 PM — needs prep.\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"duo\" style=\"margin-top: 32px;\">\n      <div class=\"panel use\">\n        <h4>Use<\u002Fh4>\n        <ul>\n          <li>Sentence case in headlines, buttons, and nav<\u002Fli>\n          <li>Em dashes for asides (\"This is supervision — not summarization\")<\u002Fli>\n          <li>Specific, named patterns (\"third session running,\" not \"frequently\")<\u002Fli>\n          <li>Second person for the coach (\"Your instinct was sharp\")<\u002Fli>\n          <li>Provocative questions (\"What happens if you stop rescuing this client?\")<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"panel avoid\">\n        <h4>Avoid<\u002Fh4>\n        <ul>\n          <li>\"Great question!\", \"Awesome!\", any sycophancy<\u002Fli>\n          <li>Hedging: \"might suggest,\" \"could indicate\" — commit to a read<\u002Fli>\n          <li>TitleCase Headlines, exclamation points, emoji in product UI<\u002Fli>\n          <li>\"AI-powered,\" \"leverage,\" \"unlock,\" \"platform\" — generic SaaS slop<\u002Fli>\n          <li>Defining clinical terms inline (IFS, polyvagal) — the audience knows them<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr class=\"rule\">\n\n  <!-- ===================== TAGLINES ===================== -->\n  <section>\n    <div class=\"eyebrow\">06 · Tagline directions<\u002Fdiv>\n    <h2 class=\"s-title\">Pick one. Or none.<\u002Fh2>\n    <p class=\"s-lede\">\"Finch\" is short and strong enough to stand alone. If a tagline is needed for the marketing hero, these are the candidates — recommendation flagged.<\u002Fp>\n\n    <div class=\"taglines\">\n      <div class=\"tagline-item recommended\">\n        <div>\n          <div class=\"badge\">Recommended<\u002Fdiv>\n          <div class=\"line\">\"See your practice clearly.\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"reason\">Benefit-first. The bird's-eye view metaphor without saying it. Pairs cleanly with the wordmark for the hero. Three words, sentence case, period — confident.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tagline-item\">\n        <div class=\"line\">\"The supervisor you always have access to.\"<\u002Fdiv>\n        <div class=\"reason\">Speaks to the core value prop — supervision is expensive and hard to schedule. Longer; works better as a subhead than a hero line.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tagline-item\">\n        <div class=\"line\">\"Pattern recognition for coaches.\"<\u002Fdiv>\n        <div class=\"reason\">Technical and accurate. Best as a subhead under the hero, not the hero itself.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tagline-item\">\n        <div class=\"line\">\"Your practice, from above.\"<\u002Fdiv>\n        <div class=\"reason\">Evokes the bird metaphor gently. Slightly more poetic but riskier — could read as aloof.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr class=\"rule\">\n\n  <!-- ===================== HERO COMPARISON ===================== -->\n  <section>\n    <div class=\"eyebrow\">07 · Landing hero · before / after<\u002Fdiv>\n    <h2 class=\"s-title\">The hero block.<\u002Fh2>\n    <p class=\"s-lede\">Per Ayman's feedback: lead with value transformation, not privacy. Headline shifts from category descriptor to benefit. Subhead drops AI-jargon. CTA stays \"Request a walkthrough\" for the founding cohort.<\u002Fp>\n\n    <div class=\"ba-grid\">\n      <div class=\"mock\">\n        <div class=\"mock-head\"><span>finch.coach · hero<\u002Fspan><span class=\"label before\">Before<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-mock hero-mock-old\">\n          <div class=\"eyebrow-h\">AI Coaching Supervision<\u002Fdiv>\n          <h1>AI-Powered Coaching Analysis Platform<\u002Fh1>\n          <p>Built by executive coaches, for executive coaches. Privacy-first AI that analyzes your sessions and surfaces patterns.<\u002Fp>\n          <span class=\"cta\">Sign up for a free trial<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mock\">\n        <div class=\"mock-head\"><span>finch.coach · hero<\u002Fspan><span class=\"label after\">After<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-mock\">\n          <div class=\"eyebrow-h\">Finch · for executive coaches<\u002Fdiv>\n          <h1>See your practice <span class=\"accent\">clearly.<\u002Fspan><\u002Fh1>\n          <p>Finch is the supervisor with a bird's-eye view of your work — naming the patterns you can't see from inside the session.<\u002Fp>\n          <span class=\"cta\">Request a walkthrough<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr class=\"rule\">\n\n  <!-- ===================== FILE MAP / CHANGES ===================== -->\n  <section>\n    <div class=\"eyebrow\">08 · What changes · for Claude Code<\u002Fdiv>\n    <h2 class=\"s-title\">The rebrand, one file at a time.<\u002Fh2>\n    <p class=\"s-lede\">Below: every place \"Coach Claude\" appears in user-facing copy, mapped to its replacement. Internal code names (variables, file paths, repo) stay <em>coachclaude2<\u002Fem> for now — only the visible product changes.<\u002Fp>\n\n    <div class=\"checklist\" style=\"margin-bottom: 32px;\">\n      <h3>P0 · ship before any public demo<\u002Fh3>\n      <ul>\n        <li><span class=\"priority p0\">P0<\u002Fspan>Replace all instances of \"Coach Claude\" with \"Finch\" in user-visible copy across landing, onboarding, sidebar, page <code>&lt;title&gt;<\u002Fcode> tags, OG meta tags, email templates<\u002Fli>\n        <li><span class=\"priority p0\">P0<\u002Fspan>Drop in the new logo files: <code>brand/finch-mark.svg<\u002Fcode>, <code>brand/finch-mark-favicon.svg<\u002Fcode>, <code>brand/finch-wordmark.svg<\u002Fcode> — replace <code>assets/wordmark.svg<\u002Fcode><\u002Fli>\n        <li><span class=\"priority p0\">P0<\u002Fspan>Update <code>app/icon.svg<\u002Fcode> + <code>app/favicon.ico<\u002Fcode> with the Finch favicon<\u002Fli>\n        <li><span class=\"priority p0\">P0<\u002Fspan>Replace landing hero copy per the before/after mock above<\u002Fli>\n        <li><span class=\"priority p0\">P0<\u002Fspan>Remove AI-generated testimonial quotes from the landing page (Ayman feedback)<\u002Fli>\n        <li><span class=\"priority p0\">P0<\u002Fspan>Add Newsreader to <code>src/app/layout.tsx<\u002Fcode> via <code>next/font/google<\u002Fcode>, keep Crimson Text as fallback during rollout<\u002Fli>\n        <li><sp
